  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0032_WYG_001-1a, image: WYG0062/WYG0062-0445a.png}
body:
  text: 讀書管見卷上元王充耘撰堯典堯典謂之虞書傳云或以為孔子定堯典為虞書蓋非孔子不能定也何以眀之堯典紀堯之事甚略其始皆作書備稱頌贊之辭中間不過分命羲和作歷一事自疇咨若時登庸以下又皆為禪舜張本堯在位七十載其可紀者獨此事乎若舜則自側微登庸攝政即位涖政命官以至其死備載于篇以此見堯典不過舜典之起頭耳伏生以舜典合堯典此正古書本是一篇之證也如此則此為舜而作不為堯而作安得不謂之虞書乎傳者云因作于虞史而為虞書非的論也費誓秦誓豈作于周史乎舜典作于夏史何以不曰夏書乎九族既睦既字當訓作盡字如既月之既言無一人不親睦也欽若昊天厯象日月星辰敬授人時欽若昊天厯象日月星辰當作一句讀與敬授人時作對蓋日月星辰即所以為天其行度有遲速莫不出乎天然測候者當謹順之而已不可妄為穿鑿也分命四仲分命仲叔四節傳者謂厯既成而分職頒布且考驗之者非也上文厯象授時者總語以大綱此下方詳告以其故也賔曰是厯象日星鳥是厯象星以殷仲春却是授人時餘三節放此然此四節是正四時乃作厯之常道别有活法存焉所謂活法者置閏是也故有閏方能定四時成嵗不然則前所謂春者非春夏者非夏矣若謂厯既成而頒布則置閏豈當在頒厯之後乎疇咨若時登庸疇咨若時登庸與疇咨若豫采作書者變文言之職任初無大小蓋堯之所訪欲得可禪代之人而用之故一咨而得丹朱再咨而得共工三問而得鯀皆不勝任至舜然後稱所舉焉故前三節皆為禪舜張本職任那得有大小邪堯禪舜堯欲得可禪之人而放齊舉胤子朱蓋父有天下傳之子此親親之常道丹朱不稱然後歡兜舉共工而云方鳩僝功蓋以為親者不足取則莫若視有功者與之尚功次于尚親故也共工以靜言庸違棄則因洪水而曰有能俾乂讓于四嶽則否德蓋功不足取則尚能能不足取則尚德尚德以為傳賢賢者有德故也然尚親尚功尚能皆不及舜惟尚德而後舜不得辭焉蓋舜雖側微而其聲實已孚于上下堯固已心擬之矣然草茅微賤無因而至前固雖加訪而衆論之所舉者皆通顯在位及其有揚側陋之命然後衆始舉之此見聖人作事周密授舜雖出乎己意而舉舜必待於衆言蓋舉天下授之匹夫非詢謀僉同未有不基禍亂者子之子噲是也堯試舜堯欲試舜獨不可使臣下妻之以女而妻以己二女何哉蓋道不出乎五倫其處父母兄弟則善矣未知其處妻妾何如也故復以此試之夫身不行道不行于妻子况以匹夫而妻帝女又且二人焉此其難處有甚於頑父嚚母傲弟者于此而能使之和洽焉則推之天下無難處之事矣凡人處順境易處逆境難堯蓋悉以逆境覘之也舜典舜典與堯典本合為一篇篇首二十八字蓋後人偽增也故其文上下皆不相蒙重華協于帝重華協于帝一句是總言下文是申説濬哲文明溫恭允塞是以八字贊舜之四德故云重華與欽明文思齊聖廣淵徽柔懿恭聰明齊聖之類皆以一字為義者不同下文玄德升聞乃命以位此協于帝之實也蓋非謂其光華可合於堯言其德有契乎堯之心不然何故命以職位也此是古文尚書手腳如所謂允德協于下亦然下文實之以子惠困窮民服厥命罔有不悅蓋子惠即所以為允德民無不悅即所以為協下也慎徽五典慎徽五典五典克從非是為司徒蓋此兩句接連試以二女之文通上文父母兄弟妻妾而言舜能使瞽叟砥豫象不格姦二女協和家道雍睦是舜能慎徽五典而五典克從者也蓋人道不出乎五常居家理則治可移於官矣納于百揆百揆非一官也即後面九官之事以其為事不一故云百揆耳司徒固在其中也堯以朝廷之事悉委諸舜是納于百揆也舜任賢使能而無事不理是百揆時敘也堯以統御諸侯責之舜舜委任四嶽得其人是賔于四門而四門穆穆也蓋堯知有舜而已舜自擇嶽牧九官與共事及其成功則固舜之功也詢事考言乃言砥可績止舜讓于德弗嗣詢事考言言可砥績則堯初得舜亦必使敷奏以言然後歷試以功但其言不可考耳舜讓于德弗嗣傳引後説為優若云讓于有德之人而弗嗣則不應即以受終繼其後受終文祖齊七政止類上帝輯五瑞舜以正月朔日受終即觀象祭告然後會諸侯先神後人其序自當如此然以事理推之新君攝位重事也四嶽必先期遍告於諸侯諸侯必豫期會集于京師以受命於新主故云既月乃日覲嶽牧頒瑞羣后蓋既近月終乃以一日受朝賀之禮即散遣諸侯至二月則東巡狩矣輯五瑞雖言于祭告之後蓋作文序事不得不爾然豈待此時而後發命徴召邪豫期召集一日受朝以後世大聚會朝賀推之可見豈有以一人之尊而逐日與諸侯相見以盡詢察禮意則為其上者不亦勞乎修五禮五玉三帛二生一死此仍舊文為是傳者欲移置肆覲東后之下恐未然蓋聖人巡守所至之處祀神祇朝諸侯考正朔同制度正禮樂使諸侯不得變易禮樂改制度耳故舜典所紀皆其大凡未暇及其細碎若東后執贄之物悉書于册則當時柴望祭告籩豆鼎俎之類何不亦紀之乎格于藝祖文即藝藝即文故藝祖即文祖非二人也作書者變文言之耳敷奏以言奏言試功旌以車服此特總敘聖人統攝諸侯之道非必並用於來朝之時也古者三載考績豈得言下即考其功且試以事功亦非考功之謂也象以典刑象非如天之垂象以示人蓋罪有小大故刑有輕重刑所以倣象其罪而加之耳象以典刑一假是立格例流共工一假是斷例舜受終之後觀象以齊七政是整齊天時祭告是交神明朝覲巡守是整齊人事封山濬川是理地道末後至制刑用法而終焉見舜自得位之後天地神人之事一切經理皆遍其規模廣大綜理周密真所謂上下與天地同流豈曰小補之哉詢于四嶽詢于四嶽非謀治於四嶽之官蓋咨詢皆命官之辭作書者變文錯綜用字耳下文闢四門明四目達四聰即四嶽職事蓋四嶽統四方諸侯其來各以方至故當闢四門以接之敷奏以言聼之者四嶽也明試以功察之者四嶽也故當明四目達四聰不然則察于東而昧于西詳于南而略于北矣若以詢四嶽非命四嶽以職事則後面總命二十二人無乃欠一人乎奮庸熙載使宅百揆舜即帝位則天下事功何乃欲求宅百揆以熙帝之載蓋作書者紀其命官之辭于即位之後而其咨命實在登庸之時其時堯為天子而舜執政故也且舜欲得人以宅百揆而衆推禹為司空則司空以下百揆也不然則自后稷以下皆有所命之職業而百揆獨無職守何邪傳謂禹以司空兼百揆經無兼官明文其所命不過曰汝平水土其與汝后稷播時百榖汝作司徒敷五教汝作士汝共工何以異哉蓋為治莫先於平水土以定民居其次播百榖以足食敷五教以成性明五刑以察姦作什器以利用其餘功及于草木鳥獸使亦得以遂其性然後節之以伯夷之禮和之以后夔之樂而終之納言以杜讒邪以相與保治功于無窮而已是此九官所職者不一所以名之為百揆也豈于九官之外他有百揆者乎堯納舜于百揆而揆敘即此九官各稱其職之效也傳者以為舜即位而命官故禹稷契臯陶之命有所不通則以禹為司空兼百揆餘三人不咨而命者申命舊職其他咨于衆而後命者為新命之官益烈山澤與禹治水同時故禹自言暨益奏庶鮮食今益作朕虞咨諸衆而後命豈亦申命舊職邪稷契臯陶既久在位而黎民之阻飢蠻夷之猾夏五品之不遜自若乃猶申命使仍其職果何取于此三人邪垂讓殳斨伯與益讓朱虎熊羆其下皆云汝諧傳引史記云朱虎熊羆為益佐則前殳戕伯與亦當為垂之佐意謂汝諧者使共此職非也禹讓稷契臯陶而用稷契臯陶伯夷讓夔龍而用夔龍故皆不言汝諧是聼其讓也益讓朱虎熊羆而未嘗用朱虎熊羆垂讓殳戕伯與而未嘗用殳戕伯與故各言汝諧言惟汝可以宜此職爾他人不能也泛言咨四嶽證以堯典疇咨可見典三禮禮有五經莫重於祭故五禮以吉禮居先舜命伯夷典禮而止言三禮蓋舉其重者言之耳典樂詩言志至律和聲是語以作樂之曲折八音克諧至神人以和是期以樂和之效驗聲依永謂以輕重清濁分為五聲而永言之歌方有所依據蓋以五聲足以括盡人聲之髙下也咨二十二人止分北三苗欽哉惟時亮天工是語言之告戒考績黜陟是法制之維持庶績咸熙是陟明之效分北三苗是黜幽之效蓋二十二人皆有功可陟其不即工而可黜者僅三苗而已舜陟方乃死陟方乃死為巡守而死之説為是以後面周公教成王以詰戎兵陟禹迹推之可見蓋欲成王整點六師巡守方國則以陟方為巡守何疑大禹謨文命敷于四海文命敷于四海一句是總贊大禹猶贊堯而曰放勳贊舜而曰重華協于帝祗承于帝曰所以起下文與上文不相屬若云禹既已布其文教于四海矣又能陳其謨以敬承于舜則誤矣嘉言罔攸伏嘉言罔攸伏野無遺賢萬邦咸寧三句是已然之效稽于衆以下方是本夫言之所以伏而不達者以上多自是而不肯咨詢於人賢之所以有遺於野者以困窮而無勢援者不得進用萬邦之所以不能皆安者以鰥寡無告之失職耳有能稽于衆而又舍己從人則善言豈有隱而不聞者宜其無所伏也能不廢困窮則未至于困窮者可知矣宜賢才之無遺也能不虐無告則未至于無告者可知矣宜萬邦之咸寧也然而此豈易能哉非聖人不能及也故曰惟帝時克警戒無虞益曰吁戒哉警戒無虞一句是總言下面曰罔曰無曰勿皆是備言其戒懼之條目末後四夷來王一句却是極言其效驗百志惟熙凡百所向必要光明俊偉慎勿卑暗汙濁亦條目中之一也蓋大者可以枚舉故一句説一事小者不可悉數則以無怠無荒總之怠以心言欲其無一念而不戒飭也荒以事言欲其無一事而不戒飭也戒之用休戒之用休是誘之以賞也董之用威是懼之以刑也勸之以九歌和之以樂也三者並用所以能使治功久而不壞也禹讓臯陶舜有臣五人而天下治舜讓天下於禹而禹獨讓之臯陶而不及益稷契何也有虞之朝教養萬民而納之于善者禹之功糾之以刑而驅天下之人使為善者臯陶之功禹則啓其為善之途順而導之也臯陶則閉其為惡之路逆而驅之也二者相須其功相埒故禹自以己之功德不及臯陶而欲舉天下讓之臯陶焉其實臯陶之功安能勝禹使禹功未敘刑將安施若益稷契則皆佐禹以成功蓋同功一體之人也己為首既自以為無功矣若推其佐則己又安得以無功而辭舜禪禹堯欲得可禪代者衆因各以所知為薦或欲尚親則舉胤子或欲尚功則舉共工或欲尚能則舉鯀至尚賢而後舉舜舜讓禹則不待人言兩言惟汝賢則尚賢無賢于禹者矣不矜而人莫與爭能不伐而人莫與爭功則尚功尚能又無有過禹者矣故曰天之厯數在爾躬蓋因人事以知之也精一執中惟精惟一兩惟字乃其用功之方精與一蓋其效驗猶視逺惟眀聽德惟聰其工夫全在思惟上明與聰非用功之謂也至於允執則猶中庸固執然確然執之而不搖奪正其用功所在若謂信能執其中則是稱美之辭而非戒勉之意堯告舜以允執厥中豈亦是稱美其信能執中也邪况下文所謂勿聼勿庸曰欽哉慎乃有位敬修可願無非教其用力持守而所謂中者豈真有髙逺難行之事非聖人不可企及邪今恆言俗語于事當其可者則謂之中其不可者則謂之不中雖愚夫愚婦皆能言之又何有傳授心法之祕枚卜功臣禹欲枚卜功臣而從其吉帝則以為卜以決疑不疑何卜今人謀既順則鬼謀無不合矣故曰鬼神其依其者必之于將然之辭也所謂卜不習吉者言縱使卜之亦必汝吉無第二人再吉者蓋以此杜其枚卜之言耳而非謂己嘗卜吉也若己嘗卜禹安得又有枚卜之説乎禹征苖三旬苗民逆命言兵力服人之難也七旬苗格言德化感人之速也夫以兵力服人宜如摧枯拉朽然朝至而夕服矣而遷延一月更一晦朔天道既一小變而猶未服何其服人之難以德化人宜若恍惚汗漫而不可以嵗月計功也然僅七旬而有苗來格蓋不逾時而屈伏焉何其服人之易也禹之征苗雖曰奉辭伐罪既數苗之非則必矜己之是猶未免有自滿之意此苗所以不服也故益勸之使還兵而增修德教庶幾不戰而屈人所謂謙可受益也禹從其言而班師舜感其言而大敷文德但知舞干羽于兩階而不復謀動干戈於逺國置有苗于度外而彼自來格焉於此見德如帝舜而猶未嘗有自足之心而恃威武以屈人誠不若德化感人之易也若曰舜之德不自禹班師而始敷苗之格非以舞干羽而後至其來也適當其時則益之言為空言而聖人以德服人之實全索然矣况上言舞干羽而下言七旬來格安見有苗之來適當奏舞之時邪堯舜禹禪授堯授舜舜授禹皆使之真即帝位而自己退間猶後世以天下授之子而已稱太上皇耳而説者謂堯舜仍為天子國有大事猶稟命焉蓋執孟子答咸丘蒙之説以為據耳今以書考之乃殊不然舜既受終祖廟祭告神祇又朝會諸侯巡守方嶽是已正名為天下君矣而堯仍為天子于上世豈有二天子邪使舜仍北面于堯而就臣位則不知祭告神祇當以何者為稱呼而朝覲諸侯之際將南面以君禮見邪抑猶與諸侯比肩而北面也邪禹謨古文之辨禹謨一篇出于孔壁深有可疑蓋禹與臯陶舜三人答辭自具見于臯陶謨益稷篇中如豫思日孜孜帝慎乃在位此即禹所陳之謨矣安得又有大禹謨一篇且堯典舜典雖紀事不一而先後布置皆有次序臯陶益稷雖各自陳説而首尾答問一一相照獨禹謨一篇雜亂無敘其間只如益贊堯一假安得為謨舜讓禹一假當名之以典禹征苗一假當名之以誓今皆混而為一名之曰謨殊與餘篇體製不類又説者以征苗為攝位後事謂其稟舜之命而其末有禹班師振旅帝乃誕敷文德一語夫舜以耄期倦勤而授禹禹安得舍朝廷之事而親征有苗舜又安能以耄期之餘而誕敷文德必勵精為治克己布政使所為有加於前方可名曰誕敷恐非老年之所能果能之則不必授禹矣故嘗謂禹謨必漢儒傅會之書其征苗之事亦不可信傳授心法之辨堯命舜允執其中其説見於論語今推其意若曰咨爾舜天之厯數在爾躬者言己之禪位出于天非有所私于汝也允執其中猶言汝好為之凡不中之事慎不可為也四海困窮天祿永終言若所為不中而致百姓困窮則汝亦休矣蓋古人授人以職位必有警飭之辭如舜命九官皆勉以欽哉之類欲其知所戒慎而不敢縱恣云耳大舜聖人也豈有蹈不中以亡天下然古人兢業自持日慎一日訓飭之語觀禹戒舜以無若丹朱好慢遊作傲虐則堯之戒舜豈其過哉中土呼事之當其可者謂之中其不可者謂之不中于物之好惡人之賢不肖皆以中與不中目之孟子所謂中也養不中才也養不才即是指人之賢不肖言之也其所謂中不中猶南方人言可與不可好與不好耳蓋其常言俗語雖小夫賤𨽻皆能言之初無所謂深玄髙妙也傳者不察其中為一方言遂以為此聖賢傳授心法也矣夫所謂心法者蓋言治心之法耳其意以為人能操存制伏此心使之無過不及然後能治天下故聖賢以此相授受其説固若有理且足以醒人耳目然初學之士于道未知向方必有先知先覺之士為之開示藴奧則可舜自側微以至徴庸觀其居家則能化頑嚚傲很者使不為姦命以職位則能使百揆時敘而四門穆穆過者化存者神治天下如運諸掌斯時蓋未聞執中之旨也而所為已如此豈其冥行罔覺邪抑天質粹美而暗合道妙邪逮即位而後得聞心法之要則其年已六十矣然自授受之後未聞其行事有大異於前日者是堯之所傳不足為舜損益也舜生三十徴庸即命禹治水則禹生後舜不過十餘年耳舜耄期而後授禹則且八九十矣使禹果可聞道及此而後語之不亦晚乎且舜之稱禹以克勤克儉不矜不伐而禹所陳克艱之謨所論養民之政皆判然于理欲之間而其言無纎豪過差者此豈猶昧于人心道心而行事不免有過不及之失者必待帝舜告語而後悟邪方其未聞也其心不見有所損及其既聞也其心不見有所益則謂此為傳授心法者吾未敢以為然也仲虺告湯以建中于民成王告蔡仲以率自中無作聰明亂舊章成湯聖王蔡仲賢臣猶或可以與此盤庚告羣臣以各設中于乃心盤庚之臣皆傲上從康總于貨寶者亦得與聞心法之訓何邪蓋嘗論之堯之告舜僅曰允執厥中而舜亦以命禹則其辭一而已當無所增損也禹謨出于孔壁後人附會竊取魯論堯曰篇載記而增益之析四句為三假而於允執其中之上妄增人心道心等語傳者不悟其偽而以為實然于是有傳心法之論且以為禹之資不及舜必益以三言然後喻幾於可笑蓋皆為古文所誤耳固無足怪也不特此也孔子告顔子以非禮勿視聼言動蓋教學者不得不爾而亦以為傳授心法切要之言非顔子之明健不得聞不知今之教者于初學之士動作不循禮度者將禁制之使不為乎抑姑聼之待其至顔子地位而後約之以禮也是其為説固有所不通耳孟子敘堯舜至于孔子以為見而知之韓昌黎謂堯傳之舜舜傳之禹湯文武周公孔子者皆言其聖聖相承其行事出于一律若其轉相付授然耳豈真有所謂口傳面命邪道者衆人公共之物雖愚不肖可以與知能行而謂聖人私以相授者妄也湯文孔子相去數百嵗果如何以傳授也邪若謂其可傳則與釋氏之傳法傳衣鉢者無以異恐聖人之所謂道者不如是也孔子告曽子以吾道一貫此亦尋常之語言而今人亦推崇以為其師弟子密相授受而以為曽子得一貫之妙且以一與貫字相為對待而訓釋之如此為一如此為貫皆不成文理何以知之以曽子告門人以夫子之道忠恕而已矣知之也蓋夫子恐曽子以為己之道施于己是一般施之人又是一般不知聖人之道退則修己出則治人成己為忠成物為恕人己雖有不同而道則安有二致故曰吾道一以貫之門人不喻其意而曽子曉之曰夫子之道忠恕而已矣蓋即其實以曉之知忠恕出于一致則知夫子之道果是一以貫之矣此與子貢論多學而識而告以豫一以貫之者語意不同此則言我之道是人己一貫彼則言余之于學非多學而識乃一以貫之猶所謂通于一而萬事畢云爾臯陶謨無教逸欲有邦止敬哉有土無教逸欲而兢業萬幾言當勵精圖治無曠庶官言當任賢使能惇典庸禮是先之以教化命德討罪是輔之以賞罰以民之視聼好惡為天之聰眀明威是存心敬畏如此安民而民不得其所者未之有也楊氏謂天敘有典而下為安民之事者非思曰贊贊襄哉傳者謂思曰之曰當作日以益稷篇有思日孜孜之語故也然作曰者是而作日者非蓋臯陶純乎臣道故言自云有功則吾豈敢吾所思者亦曰助君以成功耳若云思日孜孜則不成文理且無意義益稷帝曰來禹汝亦昌言臯陶陳謨已竟帝呼禹使言禹謂豫何所言所思者日孜孜而已猶所謂為治不在多言顧力行何如耳故臯陶有如何之問而禹遂有治水之陳其意以為當洪水橫流之時空言無施雖切何補是故豫乘四載隨山刋木決九川濬畎澮播艱食奏鮮食懋遷化居然後蒸民得以粒食萬邦遂爾作乂此豈空言所能辦邪要非孜孜不可此豫之所以欲無言也臯陶自以其所見之不逮故云師汝昌言傳者謂禹述其治水本末而警戒之意實存其間蓋欲君臣勉力以保治功恐經文原無此意艱食者用人力播種而後得之其得之也難非如鳥獸蟲魚自然生長也故以彼為鮮食此為艱食安汝止人主之患在于輕舉妄動故當安汝止以惟幾惟康蓋平其心以慮其事之始終庶幾其無失也然猶恐有遺慮其輔弼之臣又直道以匡正之既內謀諸心又外謀諸卿士宜無過舉矣然猶未也又思動而有為要足以大應天下徯望之志而後可蓋上兩句是慮善以動下一句是動惟厥時事雖善而動不適時猶無益也人君舉動如此可謂慎之至矣以此昭受上帝天寧不申命用休乎其應固可必矣所謂汝則從卿士從庶民從是之謂大同身其康強子孫其逢吉者此之謂也禹曰都帝慎乃在位止帝曰吁臣哉鄰哉禹陳謨則言帝慎乃在位以歸重於君舜陳謨則曰臣哉鄰哉以倚重其臣意各有所主也臣作朕股肱耳目豫欲左右有民是言教宣力四方是言政觀象作服是制禮審音出納五言是作樂四者為治之大要也帝欲觀古人象日月星辰之類以制衣象宗彝之類以作服是象乃倣像之象非物象之象也蓋象字不可為句斷若云物象則何得云古人之象六律五聲八音皆作樂之具不可便以為樂律有長短聲有清濁音有哀樂作樂者必先審較乎此以觀其果治世之音歟抑亂世之音歟然後以之出納五言則奏曲譜而成樂矣猶今人彈琴瑟者必先調弦故其所謂在治忽者乃審音之治忽而非審政之治忽也若云察政治之得失如何把去出納五言庶頑讒説庶頑讒説侯以眀之小人與君子雜處其頑讒之態度不彰則其心不知愧恥故以射侯明之射而不中則德不若人為可恥矣明之以射侯而猶不知愧則從而撻之撻之辱甚於射也撻之而不悛則識其過惡於簡册蓋撻之辱僅見於一時而簡書之紀載將遺臭於無已其辱又甚矣若此者豈憎惡其人哉蓋盛世皆為善之人而為惡者無以自容非誅殺則流竄能全其生者寡矣故聖人用此以激勵而教之使知遷善庶幾得以並生於天地之間也不然恐不得保其首領矣工以納言工以納言時而揚之格則承之庸之否則威之古者以樂教養人故帝舜命夔典樂教胄子而周禮亦使大司樂掌成均之法以教國子弟教之而改則薦用之不改則刑之而非謂使樂工揚頑讒之言以觀其改過與否矣光天之下上文帝患庶頑讒説故此云誰敢不讓與讒説相應敢不敬應與頑字相應蓋化天下莫如舉賢而致賢又莫如修德已德既盛則賢者自來用賢人則衆人自勸到此時人無不濟濟相讓矣豈復有讒説哉人皆爭自濯磨以應上之所求矣豈復有頑不即工也哉州十有二師州十二師即所謂十二牧也以其養民則謂之牧以其為民師則謂之師非十二牧之外又每州立十二諸侯以為之師也簫韶九成簫韶九成鳯凰來儀雖曰尊異靈瑞故别言之然其言亦自有意蓋謂祖考子孫同一氣人又有血氣心知尋常鳥獸皆目前所有一聞樂聲之和為之感動固其宜也若鳯凰則翔於千仞覽德輝而後下世所不常有也豈容易感之使來哉故必九成而後至也蓋陽數之極于九而樂陽聲也作樂而至於九成則樂之和至此極矣感物而致鳯凰則感通亦至此極矣帝庸作歌帝作歌則先股肱欲倚重于其臣臯陶賡歌則先元首以責難于其君所謂揚言者乃歌之漸非大言而疾也與工以納言時而揚之者同蓋有韻則為歌無韻則為言而兩語皆以欽哉係其後有咏歎歌揚之意亦歌之類也臯陶以為人君不必下侵臣職以求事功但委任而責成功耳率作興事者分職授任如咨命二十二人是也屢省乃成則三載考績三考黜陟是也能如是則可謂之明君君明則臣不敢欺而思盡其職庶事自各就緒矣苟為不然而欲下侵衆職則元首叢脞而股肱懈怠天下之事豈一人所能辦哉萬事之墮固其宜矣禹貢篇首敷土奠髙山大川禹敷土隨山刋木奠髙山大川敷土者蓋鯀以土湮水禹遂敷分而疏導之然後隨山刋木以治水之發源既乃定髙山大川以分别州域若云敷土而分别九州則當以奠髙山大川居隨山刋木之上今次序不然故知舊説未當九州貢賦九州田賦止是米榖非必兵車觀甸服百里賦納總至四百里粟五百里米可見蓋貢者土之所宜賦者田之所出九州之賦必皆嵗輸京師然後可比較其多寡若諸侯各私所有則朝廷安得而知其總入之數邪文王為方伯而庶邦惟正之供則所謂萬民惟正之供者必非止于畿內也南北方言南方流水通呼為江北方流水通呼為河南方止水深濶通謂之湖北方止水深濶通謂之海子碣石河道傳據程氏以為碣石已淪入海九河亦為海水所漸而謂平州正南石山尚在此即碣石或者以為今谷口御河入海處北岸有石山聳立狀如小孤山北人呼為碣石古人嘗鐫銘其上揭先生亦嘗刻詩石間御河水自衛輝彰德而來過臨清東光滄州長蘆至赤谷下海湍流黃濁與黃河相類或云此正古黃河道謂之逆河蓋以海水逆潮而得名其上合流如滹沱易水之類通有九水又與九河相應而自海道入河者碣石亦正在右轉屈之間其與夾右碣石入河皆相吻合至于平州正南别無石山在海中者不知昔人何據而説此豈亦未嘗見而云爾邪又為朝宗所説案此説有理但于播為九河一句説播字未通尚欠考訂作十有三載乃同兖州田賦作十有三載乃同者蓋當河下流又有九黃河衝冒受患最深其用功最先而成功獨後水平之後田地既可耕作矣又必優之十二年待其一紀之後嵗星一周天道變于上地力復于下然後使之供輸于公上比同他州蓋因其受患之深所以優恤之至嶧陽孤桐梧桐非可以作琴瑟嶧陽之桐乃枯桐樹耳錫貢厥包橘柚錫貢與錫貢磬錯以為非常貢待錫命而後貢恐尚未然錫者上與下之辭而納錫大龜禹錫玄圭師錫帝曰皆以錫書蓋大龜為國之守器禹告成功是為舜成百世之功衆舉舜是為天下得人皆非常之事故變之而亦不以常辭書獨橘柚磬錯謂之錫貢有不可曉若謂口腹之欲待錫命然後貢則淮夷貢魚豈非以充口腹者邪謂磬錯非常貢則泗濵貢浮磬青州貢海物惟錯何不待錫命邪錯賦錯出之賦止于揚荆豫梁豈惟迤南四州田有一易再易而東西北三方田皆可嵗耕者也是亦有不可曉者三苗舜竄三苖説者謂驅逐禁錮其君長然共工歡兜鯀皆言其名獨苗之君長不名而謂為三苗是固可疑舜典又謂之分北三苗禹貢又云丕敘臯陶謨又云何遷乎有苗吕刑又云遏絶苗民夫謂之分北則必非止于一人謂其丕敘則必非止于一君又謂之遷有苗謂之遏絶苗民則亦不特遷徙其君長而已此必并其國人俱徒之也左氏記四凶而指為一人固已訛矣流放竄殛變文耳其實皆遷徙也猶之命官一也而曰詢曰咨祭祀一也而曰類曰禋曰望曰遍皆作書者錯綜用字謂其罪有小大而刑有輕重者非也帝舜平生加刑于人此四事為大故作書者取而類記之而非謂其一朝罪四凶也後世不察遂以為舜誅四凶皆攝位時事故于禹征有苗處説不通遂以為三苗乍臣乍叛寧有此事邪夫三苗既匪在朝之臣舜得不動干戈執其君而竄之舜執其君而無所難禹征以六師而反不服何邪蓋苗頑不即工故征之來格而後分北竄徙之所謂臯陶施象刑則加以流竄者是也豈施以刑不服而後征之邪然既懷之以文德而來格苗則已革心向化矣又從而追咎其既往而分北之豈叛則討之服則舍之之謂乎聖人必不爾也蓋征苗而苗格此出安國古文與舜典益稷臯陶謨相抵牾此必漢儒傅會之辭不可盡信導山禹貢有導山導水水非疏鑿不可山豈待疏鑿而使入海邪而導岍岐則終以入海何也舊説以為山逾于河者固非是今傳者以為禹逾於河似矣而下文至于碣石入于海豈亦禹入海邪蓋當洪水懷襄平地無非是水不復知有河道故禹先隨山刋木以決導之待其水落土出然後河道可見於是從而決九川故導山即所以導水其言入海固宜但其所導之山皆是衆水發源與水道有相干涉者非泛然視其廣博髙大者而導之也如岍岐是黃河所經大嶽是汾水所出王屋是濟水所出鳥鼠以導渭熊耳以導伊洛桐柏以導淮嶓冢至于荆山內方至于大别可以見漢水之源流岷山之陽至于衡山過九江至于敷淺原可以見江水之脈絡但其所謂逾于河所謂至于某者又若不專指水言者尚欠考訂敷淺原敷淺原恐非廬山髙平曰原而又名敷淺則必平曠之地不為髙山可知禹貢導山即所以導水不論山之髙大但於水有干涉曽用工者則録之若謂其所表見諸山必其髙大可以辨疆域廣博可以奠民居則五嶽中之嵩山揚州則若舒州之灊山江東之茅山九華山之類其綿亘皆數百里何故略不載紀邪導水次序禹貢導山水皆自北而南天下之水莫大於河其次則江漢皆發源自西經中國以入海者也故導水先言河次漢次江濟與淮雖能入海而其源短故居其次渭水洛水皆不能入海者也故居其末漢江江漢二水勢均力敵皆能自達于海者也故禹貢雖紀其合流仍各見其首尾紀其合流故于漢水言南入于江江漢朝宗于海各見其首尾故于漢水言東滙澤為彭蠡東為北江入于海於江水則言東迤北會為滙東為中江入于海然于漢水言南入江則江水北入漢可以互見矣于江水不言會于漢而曰會于滙則漢水滙為彭蠡亦可以互見矣此古人敘述之精雖不費辭而一分一合脈絡昭然自見今讀者不細考而妄疑古人疏略誤矣九江彭蠡先儒有九江彭蠡辨其辨九江則是而辨彭蠡則非彭蠡乃今之鄱陽湖其源固有豫章諸江而其為澤則固江漢之所滙者也今春月江水暴漲則滙而入湖蓋江流浩渺而其下束以小孤山水道狹甚其勢不得不逆流而入此澤故有發舟湖口無風而一夕達鄱陽之安仁者問其故乃舟乘逆流行甚迅速猶隨潮而上者也故江水之滙衆所共知今乃疑之顧弗深考耳且謂漢自大别入江合流已七百餘里安能復識其滙澤者為漢水邪亦可謂膠固之甚者矣夫單敘漢水源流則其勢不得不以漢水為主但既云南入江則東滙澤為彭蠡即江漢共滙可知矣不成曰南入于江東與江共滙澤為彭蠡然後為明白邪又謂彭蠡在大江之南當曰南滙不當曰東滙滙既在南則當曰北為北江不當曰東為北江其論南北反戾幾為可笑蓋江漢兩水皆發源西蜀而東流入海獨漢水到大别入江則析而南流與江相合仍舊東流而滙為彭蠡又東流為北江以入海其東西南北以天下大勢論不主一江南北而言也今若欲改云南滙彭蠡則是南流入江之後又南滙彭蠡則漢水當逆流向洞庭矣滙澤之後不云東為北江而云北為北江則漢水又當決破安慶橫入淮河矣三江三江既入疑當從蘇氏之説以漢為北江岷水為中江豫章水為南江蓋揚州之水莫大于此經隔千餘里以入海安得舍此不録而録震澤下之三江也邪傳者疑三水既已合流為一不得復分為三江不知大小相埒各能達海故雖見其合而仍以三江書以伊洛瀍澗入于河江漢朝宗于海推之可見不然何故于大别明紀漢水入江矣於滙為彭蠡之下復分漢為北江岷為中江乎且不以岷水為南江而云中江則隱然見别有南江章水是也古人紀載詳密而不費辭類如此非後人所及也禹貢體製洪範禹貢其文相類洪範則先撮總而後開列九疇禹貢則先條列九州而後撮總導山所以總九州之山導水所以總九州之水內之為九州外之為四隩髙之為九山下之為九川小之為九澤大之為四海此總言水土無不平治也六府孔修所以見九州物産之充足正庶土以砥慎財賦所以總九州之土貢則三壤以成賦中邦所以總九州之田賦種藝之利不通于夷裔此田賦所以止于中國也水土既平然後財用充足財用足而後可取于民故較土田以定貢賦貢賦定而地之廣狹可見故可以錫土姓而建侯國夫如是則所以經營天下者已備可以無為而治矣故祗台德先而莫有距違者焉所謂蒸民乃粒萬邦作乂者此也五服五服五千但大約立法如此耳非四面截然正方真如棋局也堯都冀州冀之北境那得二千五百里邪古今天下止有許濶其土地所産大略相同如舜封象於有庳羲仲測日於嵎夷禹南巡于會稽導弱水至于流沙四裔之地皆古人足迹所及者謂周人九服增地一倍者妄説也荆揚土貢多于餘州今亦未見有加於古貢象齒則地盡南海可知冀北土貢止皮服古亦未見有勝於今謂古今土地有盛衰不同者臆説也譬之夏后授田五十畝至周人增為百畝夷畎澮溝洫破塗路遂徑不大煩擾邪其所井之田安得皆平原廣野髙下如一邪要亦因其可井而井之其不可為井者則亦品搭多寡以授之使如井田之數耳五服之制亦由是也東漸西被聲教至于海濵則止矣何以又云漸于海蓋海島之夷與流沙以西之戎狄咸賔貢於中國則是有虞之聲教東不止於海且漸入於海中西不止於流沙又蒙被流沙之外矣禹錫玄圭上之與下謂之錫禹奉玄圭而云錫玄圭何也蓋為舜成百世之功不可以常辭書猶之衆人舉舜而云師錫帝曰蓋為天下得人亦非常之事禹貢之作禹貢非作於禹治水成功之時必後來追紀之書其間如云錫土姓祗台德先不距朕行又如東漸西被之語皆後靣追述之辭豈禹八年而水土平民方脫于昏墊教化遽能大洽固無是理也且其間如兖州田賦作十有三載乃同夫水平之餘又使耕治十三年方取其賦豈逆計其年嵗而優之邪此必取賦後紀録無疑也且舜竄三苗曽幾何時而于雍州已言三苖丕敘此豈氷土初平紀録之語邪甘誓乃召六卿六卿安知非王朝六卿諸侯大國三卿武王伐紂故諸侯則司徒司馬司空佐行天子出征則六卿隨往亦常理耳三正怠棄三正傳以為子丑寅之正不知王朝頒朔三正並頒於諸侯邪抑止頒寅正也而奈何責有扈以怠棄三正且不奉正朔是欲擅變禮樂改易制度何得云怠棄或者以為禹論養民莫重於六府三事威侮五行是不修六府怠棄三正是不務三事為諸侯而不知養民此天所以絶之也其説為優胤征聖有謨訓聖有謨訓至邦有常刑是先引格例其或不恭謂各敬其職非指為恭君也若專以諫君為恭則羲和非以不恭君而受伐先時後時先時者殺不及時者殺此特為歷官誤算天象不可凖信重其法耳而非謂凡百官作事違限者皆殺也其爾衆士懋戒哉懋是勉其所當勉如威克愛之類戒是戒其所當戒如愛克威之類仲虺之誥民墜塗炭民墜塗炭只是陷民于水火耳塗非真指泥也泥何能為民害惟水能殺人兹率厥典奉若天命此二句當從真氏之説蓋兹者此也指伐桀之事而言之也湯以為不幸處君臣之變而仲虺以此乃率循其常道以順天命而已蓋治則戴之以為君者常道也亂則誅之以救民者亦常道也變而不失其正即所以為常也故湯則駭之以為變而仲虺則視之以為常惟王不邇聲色惟王不邇聲色不殖貨利懋官懋賞用人改過克寬克仁是歷數湯之善行彰信兆民是總言其善行之足以取信于天下非特指寬仁一事而已傳者失之初征自葛湯征自葛民傒其來蓋苦桀之虐而欲其拯己於水火之中耳傳引吕氏之言謂其征伐之際唐虞都俞揖遜氣象依然若存無乃大巧而不切于事實邪推亡固存推亡固存邦乃其昌言夏有亂亡之形不可不滅是乃理勢當然非湯欲圖其天下也此猶是釋湯伐夏之慚非勸勉之也當以林氏之説為正懋德建中懋昭大德建中于民此是儱侗大綱言之言當明教化以立個凖則于天下如親親使人各親其親長長使人各長其長如此而已至于以義制事以禮制心此説得嚴密正是垂法後嗣不可有豪髮過差蓋湯為創業之主非特天下之所取正亦後嗣之所取法者也茍有一豪不中禮度則後必有甚焉者矣傳者以後二句屬上文非是慎終惟始慎厥終當思其始而謹始之道無他惟殖有禮覆昏暴賞善而伐惡是是而非非如是欽崇天道則自然可以永保天命而有終矣不然則今日固代夏而王矣少不加謹安保後日不為人所滅乎湯誥賁若草木兆民允殖此二句當作一連説夫害民者去而憔悴之民皆有生意賁然如草木之榮茂而可觀矣若説天如草木不成義理凡我造邦凡我造邦無從匪彝無即慆淫各守爾典以承天休此四句正是誕告萬方之要語前二句是禁止之後二句是開導之萬方有罪在豫一人萬方有罪在豫一人蓋使天下皆化于善而不陷罪惡方是人君能克綏厥猷也林氏之説為長伊訓元祀十有二月三代改正朔不改月數見于詩書周禮詩有七月流火與四月維夏可見其云一之日二之日者變文耳非指此為一月二月也周禮正月之吉始和若以子月為正月則仲冬嚴沍安得始和二月掌判會萬民使合昏此必今之二月未必臘月也仲夏斬隂木仲冬斬陽木四時皆未嘗改獨有所謂正嵗者則正是以十一月為嵗首故喚作正嵗如月令是秦書則以季秋之月朔頒來嵗朔于諸侯是秦分明以十月為嵗首而未嘗以為春正月也商書元祀十二月皆是以首月行大事何嘗改月數乎惟春秋改之不知是魯史改之乎抑朝廷改之乎論語莫春浴沂雖不見是何月然所謂莫春必今三月若以子月為春則莫春乃正月北方正月氷猶未盡泮安可浴乎先儒疑之故以為上已祓除又云地志以為有溫泉皆意其為天寒而未可浴也然既已服春服又乘風舞雩壇豈可謂寒邪其為今之三月無可疑者是孔子之時猶未改也獨孟子七八月之間旱與十一月成徒杠十二月成輿梁則己改之但孟子又出春秋之後其改也宜矣竊意周初未改及春秋然後改今亦未見改自何時但于春秋可見其改耳然若非春秋改則周用子正於他書皆無可證驗先儒有謂武王以十三年滅紂就改十一月又就改為春則無緣後面周公作詩作周禮皆不遵用新正朔而止從其舊此為可疑夫子所謂行夏之時則恐商周四時與夏實不同故夫子欲改而從夏不但更其嵗首之月耳一説正魯史改之蓋武王定天下改用子正不過以新天下之耳目而月數實未嘗改故正以詩書所引皆坦然無可疑者至魯史則以周公為文王之子武王之弟於周室為懿親於姬姓之國為最長而天下諸侯於是乎觀禮者固當遵用周之正朔以率先天下其改之宜也夫子修春秋而曰其事則齊桓晉文其文則史亦因魯史之舊文載當時之事耳布昭聖武湯布昭聖武猶云懋昭大德蓋湯欲誅暴救民不得不用武耳武曰聖武猶德曰懿德而布昭則是湯稱舉而發揚之而謂湯之德威敷著於天下非是今王嗣厥德今王嗣厥德罔不在初立愛惟親立敬惟長始于家邦終于四海蓋言前王以武功取天下後王當用文德以致太平所謂德者不過愛敬二端而已蓋孩提之童皆知愛親及長皆知敬兄愛親是仁敬長是義二者出于人性之自然一隂一陽相為對待猶春生秋殺然蓋一于愛則流一於敬則離二者不可偏廢也人惟愛也故惻然而有所不忍惟敬也故肅然而有所不敢不忍不敢而後君臣父子長幼貴賤得有所繫屬而不離相安而不亂故治天下之道莫切於此彼百姓之不親是不知愛五品之不遜是不知敬不愛不敬而後大亂生焉故親親而人各親其親則一家興仁而一國興仁矣長長而人各長其長則一家興讓而一國興讓矣大學所謂上老老而民興孝上長長而民興弟孟子所謂老吾老以及人之老幼吾幼以及人之幼天下可運之掌皆此道也先王肇修人紀先王肇修人紀以下是歷數湯之行事以見其積纍之勤苦蓋肇字與以至字相為首尾言由其始於如此其所積纍不亦難乎先儒誤以肇字專屬之修人紀遂以為湯始修復人紀非也嗣王祗厥身嗣王祗厥身與後面祗爾厥辟相似言當愛敬其身不可以縱欲敗禮度是輕其不資之身也太甲顧諟天之明命天之眀命只是天之眷命猶云畏天之威相似大學引此以釋明德是斷章取義如緝熙敬止之類今釋書者豈得反據大學而指為我之眀德乎若以為即明德則于後面受天明命以有九有之師將何以釋之乎謂之明命猶云元命大命皆雅其稱謂耳慎乃儉德慎乃儉德惟懷永圖是總言以戒其縱侈之病下面若虞機張省括則釋是申之以譬喻欽厥止率乃祖攸行是正言以盡其意蓋射者猶不肯妄發人君安可輕動而不思為長久之計乎凡事皆有當然之則一定而不可移者所謂止者此也人君要道敬守此理不敢踰越但有所為一循祖宗成憲則便是能慎德而可以久長之道也大臣安得不歡喜而後世安得不仰其令名夫君有不眀臣不可以不忠為臣之道惟知媚于天子而已今伊尹有以懌之言又有承王之休亡斁之語使太甲而縱欲則伊尹遂可厭之乎是不然媚于天子此人臣事君之常道而伊尹則自任以天下之重其所為安可以常理拘也觀其自謂豫弗狎于弗順而放太甲于桐則可見矣然而有伊尹之志則可無伊尹之志則篡也不可以為常法也視逺惟明聼德惟聰視逺惟明聼德惟聰傳云思明則所視者逺思聰則所聼者德非也人情事生則孝事死則忘矣接上則敬接下則慢矣視近則明視逺則昏聼佞則聰聼德則惑猶魏文侯所謂聼古樂則卧聼鄭衛則喜不知倦人情大抵如此故當有以矯之子張問明夫子告以不受浸潤之譖膚受之訴者可以謂之明又可謂之逺是以逺與眀對言逺亦眀之類也與此視逺惟明不同其注引之誤也君罔以辨言亂舊政辨言亂政吳氏謂太甲所失者此非也太甲居桐三年百官總己以聼冢宰政事皆出伊尹今而後復政厥辟伊尹將欲歸休伊尹深慮已既退休則必有讒人交構長短以求媚其上使太甲悉反其所為者太甲若誤信之則國之禍必自此起此君之所當戒者若人臣則功成身退以謙遜自處庶幾可以保全功業不然則患失患得之心生而禍亦由此起矣此臣之所當戒者如周公復政成王有明農之志亦不能無此慮故一則曰厥若彝及撫事如豫一則曰篤敘乃正父罔不若豫皆惟恐已退而君有變更於其間也咸有一德德無常師德是總言師則指其人善則指其行事人君居天下之上其德必首出衆人而事事盡善乃可然豈必生成哉亦取諸人以為善而已故德不可執一人以為師但是善者皆可以為師善不可執一善以為主惟協合於一而已蓋欲其悉有衆人之萬善湊成自已之一德耳茍匹夫匹婦不獲自盡則民主無與成厥功安可自廣而狹人哉其與孔子所謂一貫者不相類與精一執中之言亦不同彼是言作事要常適其中此則欲取諸人以為善耳盤庚豫若觀火豫若觀火豫亦拙謀作乃逸傳謂我視汝情明若觀火非也夫人雖不可嚮邇猶可撲滅故火蔓延則當撲之今乃坐觀其延爇是拙謀矣人臣不從上令則當刑以驅之今乃聼其所為成就其過惡是與觀火者何異惡得不謂之拙謀説命若金用汝作礪金而無礪一器之不適用耳其利害所係者小巨川則日涉者衆若無舟楫則所係者大矣然但涉者病之其不涉者固未害也若嵗大旱則舉天下民物之命皆懸于一雨其不可無也必矣故曰三語雖若一意而實一節深一節者此之謂也若跣弗視地若跣弗視地厥足用傷與若藥弗瞑眩厥疾弗瘳之語不倫意亦不相對值竊意前二句是古書後二句是傅會后從諫則聖聖者通明之謂作事無纎豪過差以其能從諫故也至于后克聖臣不命其承二句説不通后以從諫而後聖是聖由諫而後得也如何聖而後臣方諫之惟天聰眀惟天聰明惟聖時憲是承上文明王奉若天道建邦設都而言惟臣欽若惟民從乂是因承以大夫師長惟以亂民而發天則聰明聖則立法臣則順君民則從治各有體式其理勢自當如此下二句不是憲天之效憲非效天乃是立法惟口起羞言語是宣文教甲胄是供武備衣裳是命有德干戈以討有罪人君為治惟此四者能審所當用而不失則言不至於起羞甲胄不至於起戎以賞則勸以討則懲無所往而不善矣故曰允兹克明乃罔不休惟厥攸居惟厥攸居政事惟醇兩惟字皆訓作思一句是一義以下句為上句之效者非也爾惟訓于朕志爾惟訓于朕志是欲其格心非徒然輔德也蓋志者心之所之欲有所向而未見諸行事者也人臣匡君于此正之則易待其見諸行事而正救之則難蓋人君之志慮不可少有所偏當適其中而後可故辟之作酒醴爾必思麴與糵辟之作和羮爾必思鹽與梅夫偏於麴則苦偏於蘖則甘有鹽無梅則鹹而不可食有梅無鹽則酸而不可食故曰爾交修豫言當兼致其力而不可使有所偏也此志既正則作於其事發於其政安有不善者哉惟斆學半傳謂教人所得居自學之半蓋教學相長此理固有之但傅説此言為髙宗而發不知髙宗學成之後使之轉教何人方可以足成那一半若不教人則髙宗所學終是不全矣以此觀之則教者止説得一半學者當自用功如舉一隅能以三隅反之類未見其為憸巧也四海咸仰朕德四海仰德時乃風風非教也蓋説之出也異乎尋常命相故天下皆翹首企足而望之曰後有下令而異於前者必新相格君之功也是其風聲足以聳動四海耳非教也對揚休命對揚休命對者酬答其所言揚則稱舉之所謂奉以周旋弗敢失墜是也非所謂對以己而揚於衆周書用答揚文武之光訓亦此意蓋古文書出于一手故其言每每相重讀書管見卷上
