body:
  text: 讀書管見目録書類卷上堯典舜典大禹謨臯陶謨益稷禹貢甘誓胤征仲虺之誥湯誥伊訓太甲咸有一德盤庚説命卷下泰誓武成洪範旅􅋙金縢大誥微子之命康誥酒誥梓材召誥洛誥多士無逸君奭蔡仲之命多方立政周官君陳顧命康王之誥畢命君牙吕刑文侯之命費誓臣等謹案讀書管見二卷元王充耘撰充耘字耕野以書義登進士二甲授承務郎同知永新州事後棄官飬母著書以授徒乃成是編自宋末迄元言書者率宗蔡氏充耘所説皆與蔡氏多異同觀其辨傳授心法一條可知其戞然自别矣其中如謂堯典乃舜典之緣起本為一篇故曰虞書謂象以典刑為仍象其罪而加之非垂象之意謂逆河以海潮逆入而得名皆非故為異説者至於洪範錯簡之説伊訓改正不改月之辨尚未能糾正而所附周不改月惟魯史改月一條尤為強詞分别觀之棄短取長可也又禹貢篇內嶧陽孤桐一條語不可解原跋稱此書得之西臯王氏寫者草草其末尤甚此條疑當時訛脫今無從是正矣乾隆四十年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1978134e3791a6e6eef3bad478cf65a84cc93b6e8ef1d9aa0ef52b5bc3e6dcb6
