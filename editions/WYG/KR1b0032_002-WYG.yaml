body:
  text: 讀書管見卷下元王充耘撰泰誓亶聰眀作元后聰眀作元后蓋合萬國而聽於一人其舉直而錯枉是是而非非必無纎豪過差而後足以服天下非極聰眀者不能故商書亦言惟天生聰眀時乂又言實作則于湯有光于湯有光當從孟子集註傳謂于湯之心為益明白太過武成列爵惟五列爵分土是定制度法既定須人以守之故任賢使能得其人使之如何為政曰重教化使民知禮義重食䘮祭使民養生䘮死無憾而已惇信眀義是以身率之于其先崇徳報功是以勸賞激厲之于其後如此而天下可不勞而治矣其言不一而其間自有次序洪範惟天隂隲下民天隂隲下民是無形聲可騐故武王不知彞倫之所敘者何由蓋治天下不過欲敘彞倫使君君臣臣父父子子則天下治若君不君臣不臣父不父子不子則天下亂彞倫果何由而得其敘哉有九疇以維持之則彞倫敘無九疇以維持之則彞倫斁矣是九疇自九疇彞倫自彞倫彞倫是人之五常九疇是治天下之大法而𫝊以彞倫之敘即九疇之所敘者非也夫治天下莫急于五行所以天生五材民並用之缺一不可民非水火不生活故九疇以五行為先人有所養而後可以修己故次之以五事已既修而後可以治人故次之以八政五紀是作歴以合天皇極是人君以身立教三徳是先後之以刑賞柔克者作福賞也剛克者作威罰也或剛或柔或正直随時制宜是又能因時制變矣然人有不能決則相率而聽于天七稽疑是也庶徵則因效騐之見于天者以為之省騐福極是因效騐之見于人者而為之勸懲九者聖人所以治天下之具其序雖有先後而其中蓋無所重輕𫝊者以前四疇為皇極之所以建後四疇為皇極之所以行牽強無味蓋皇極不過九者中之一耳安得以此一疇揔括九疇且五紀作厯稽疑卜筮于建極何相干乎九疇非始于禹如卜筮起于伏羲作歴始于黄帝堯舜以來皆從事五事以修身皆用刑賞威福以為治豈待禹而後有乎蓋聖人迭興立法創制先後錯出而無倫至此敘為九章而聖人治天下之大法首尾完具粲然如指諸掌則自禹始耳故曰洛出書而九疇敘一五行五行非泛論造化指五材言之乃養民之六府耳故末歸宿于鹹苦酸辛甘而加以五作字曰者出于自然作者出于人力二五事五事者何眀五者人之所當從事者也蓋人之自修欲其肅乂哲謀聖而已然肅乂哲謀聖本於恭從明聦睿恭從眀聦睿生於貌言視聽思人之正已惟事乎此五者足矣與第一疇之意同皆歸重在末五箇作字上五行水為老隂火為老陽故其性或潤或燥一上一下皆一定而不可移木為陽穉金乃隂穉故其性可曲可直可從可革而無定以五事貌言視聽思強分配水火木金土甚無謂蓋九疇中五行只是論切于民用之五材而諸家不察咸以為論造化故如皇極稽疑庶徵福極一一牽合相配穿鑿可笑稽疑雨霽蒙驛克庶徵雨𤾉燠寒風猶云與五行相闗至于五福六極與五行有何干係而又欲牽引附會此漢儒之失而後人不悟又復祖述之四五紀五者何以謂之紀蓋歳月日星辰厯數為天紀猶君臣父子五常為人紀也天道推移雜然而無統而聖人作厯即此五者以為之經紀焉分之則有歲焉有月焉有日焉有星辰焉緫之則為厯數厯數如今厯相似所以具載歳月日星辰于其上而以頒授諸人者𫝊以為歩占之法者非如云天之厯數在爾躬豈亦有歩占之法邪不過指其書耳五皇極皇建其有極與湯建中于民相似皆是以身立教以其至極而無以復加則謂之極以其無過不及則謂之中以其至當而不可易則又謂之至善其名殊其實一而已至善猶云極好相似論其條目之大者不出乎五常如為父而慈是父道至此而極不可過不可不及矣天下之為人父者豈復有加于慈者乎為子而孝是子道至此亦至矣極矣不可有以加矣天下之為人子豈復有加于孝者乎人君建極斂五福以錫庶民豈真有斂散之迹哉大概有道之君立乎其上則自能措一世于治平民皆飽食煖衣入孝出弟有夀康而無鄙夭者是果誰之力哉謂非其君有以致之不可也董子所謂人君正心以正四方而諸福之物可致之祥莫不畢至者此即建極斂福錫民之謂書所謂一人有慶兆民賴之者此即斂福錫民之謂也庶民于汝極錫汝保極者蓋建極在一人而保極在天下始焉人君以身立教率天下之民以歸于極及其教化既行風俗既定則建極之君有時而不存而父慈予孝之俗亘千百年如一日是君之極反藉民以保之也謂之錫保者重其辭與錫福為對也凡厥庶民有猷有為有守汝則念之凡厥庶民有猷有為有守汝則念之蓋天生材止有此三等一等是能出謀𤼵慮者謂之有猷一等是能經營四方者謂之有為一等是能彌縫周固物莫能奪者謂之有守正如髙祖之用三傑是也此三者特其生質之美耳汝當思念之未知所謀所為所守者果當理乎抑或挾其才以為不善者乎若求其善則不協于極無善之可稱求其罪則不罹于咎無惡之可舉此則當容受而収録受之若其而康而色曰予攸好徳則可錫之以福而進用之矣上文念之正是念此兩途夫人固有色厲而内荏者矣此則安和之色出于自然而非強為人固有言不及義者矣此則𤼵言惟在于好徳則其積中形外者可見矣錫之爵禄豈其過哉若謂念之受之随其材之輕重以成就之則不成有猷有為有守者反不如不協于極不罹于咎者蓋緫是三等生質之美者但不當分作兩股皇極之敷言皇極敷言只是以禁止開導之方形諸反覆詠歌使人知所以遏人欲由天理耳故其間既言無偏無陂矣又曰無偏無黨矣又曰無黨無偏言遵王之義矣又曰遵王之道言會其有極矣又曰歸其有極無非叮嚀反復之辭初無深淺異同之論今傳者以偏陂好惡為己私之生于心偏黨反側為己私之見于事同一無偏也一以為生于心一以為見于事不知何以分別王義王道不過言皇極耳而曰皇極之所由行且以遵義遵道遵路為會其極蕩蕩平平正直為歸其極亦殊不可曉蕩蕩平平不過言皇極之理大公至正無少私曲耳如何謂之歸其極遵義遵道同一遵字而析道義為兩言會極歸極同一極字而變會歸為兩字蓋其行文不得不爾而意豈有異同哉若必以一句為一義則無偏無黨與無黨無偏亦有兩意乎極之敷言皇極之敷言蓋更端以緫結一章大㫖上言人君立教一本于天此言庶民歸極則歸功于君代天立教但知有天而已庶民因君以復其性但知有君而已六三徳三徳者人君御世之權随時而制宜因時而變化有不賞而人自勸不罰而人自畏者是之謂正直若剛克則糾之以猛所謂惟辟作威是也柔克則待之以寛所謂惟辟作福是也皆以不齊齊之蓋並行而不悖者也七稽疑稽疑雖以蓍龜為重然天視自我民視天聽自我民聽豈有卿士庶民咸以為非而獨取信蓍龜足以獲吉者此商俗尚鬼之流弊也八庶徵曰雨曰𤾉曰燠曰寒曰風曰時是緫言下靣是分兩股五者來傋各以其敘是為休徵張本一極傋凶一極無凶是為咎徵張本五者來備即是上文雨𤾉燠寒風各以其敘即是上文時字之義備而又敘則吉極無極備則其不適時者可知五者順序何獨見于庶草蕃廡蓋植物皆藉雨𤾉燠寒風以生長収藏然如後彫松栢不足以見天道之逆順惟草最柔脆易榮易枯雨𤾉及時則萋萋豐茂一或愆期則其憔悴可立而待故獨指此為言王省惟歳曰王省惟歳以下錯簡當為五紀傳文若云王與卿士師尹各以尊卑為序而省其得失于歳月之間則積日以為月積月以為歳使王之所行無失而卿士師尹兆天變于一月一日之間則王之善不免為卿士師尹所累矣使王之徳足以調隂陽則卿士師尹之失遂為王所庇矣其休其咎將使誰執哉况此言歳月日而下言庶民惟星終之以日月之行有冬有夏其為厯數可知非五紀傳文而何日冬行南陸而夏行北陸月冬行北陸而夏行南陸故長短相反而成望若春秋則共行南北之間晝夜長短適均無有異同故經但言日月之行有冬有夏而不言春秋者此也九五福六極五福曰嚮六極曰威不知上之人以此勸懲臣民乎抑以此自勸自懲乎是則有不可曉五福不言貴六極不言賤蓋貴未必為福賤未必為極若曰不言貴欲人之安于賤則獨不欲使人安于貧乎旅獒王乃昭徳之致于異姓之邦王乃昭徳所致于異姓之邦分寳玉于伯叔之國寳玉亦徳之所致互文耳金縢乃卜三龜卜三龜而一習吉者習重也兩龜之兆吉耳啓籥見書然後知彼一龜亦幷是吉也予小子新命于三王新亦當作親言親禱于三王也命非受命之命乃命告之謂也我之弗辟我之弗辟當從古註周公以身任社稷管蔡謀危宗社得罪于天下在所必誅周公安得顧私恩而出避于國之東乎是時成王幼冲政自公出故曰小子同未在位周公安可一日去左右而乃居東二年不知國事將付之誰邪且所謂流言者必管蔡與武庚同為叛逆以此聲周公之罪而出師耳故周公不得不往征之而史謂之流言者特以其誣妄不實而妄加公罪乃無根之言耳豈但如今人造為訛言作為匿名文書之類乎周公居東不知誰為挨究造言之人遲遲兩年而後得實乎且史于居東二年罪人斯得之下即繼之以于後公乃為鴟鴞之詩以貽王而後及風雷之變𫝊者謂因天變迎公歸而後管蔡叛乃命周公東征然鴟鴞之詩已有旣取我子無毁我室之言則彼時管蔡已為武庚所累而伏誅矣豈有至此然後叛之理要之湯武以臣伐君周公以弟誅兄皆斷以大義所謂公天下以為心者固不可以尋常君臣兄弟論也大誥弗弔天弗弔天降割于我家弗弔旻天大降喪于殷與詩不弔昊天不宜空我師不弔昊天亂靡有定語意政同蓋弗弔天當作一句讀而弔音如字當訓為弔恤之義天有降福謂之天降災者謂之弗弔天猶言無情之天也微有致不足于天之意所謂天地之大人猶有所憾以其降災故也天閟毖我成功所天閟毖我成功所予不敢不極卒寧王圖事肆予大化誘我友邦君天棐忱辭其考我民予曷其不于前寧人圖功攸終天亦惟用勤毖我民若有疾予曷敢不于前寧人攸受休畢三言天三言予蓋謂天意如此我安敢不如此天亦惟用勤毖我民若有疾云云天惟喪殷若穡夫天惟喪殷若穡夫予曷敢不終朕畞此二句是一意天亦惟休于前寧人予曷其極卜敢弗于從率寧人有指疆土此二句是一意皆是以天與予對言文勢猶前三言天三言予之意敢弗于從率寧人有指疆土當作一句于訓為往言敢不往從率循寜人有指定之疆土傳謂敢不從爾弗征非是微子之命惟稽古崇徳象賢惟稽古崇徳象賢未便是說湯蓋是先引格例言稽諸往古有徳者宜在所尊崇其子孫之賢者使繼先王之統修其禮物以作賔王家與國咸休永世無窮如舜封堯後夏崇舜後商立夏後古固有此制也下文乃祖成湯以下是言崇徳爾惟踐修厥猷以下是言象賢欽哉往敷乃訓以下是教之統承先王修其禮物作賔王家永世無窮予嘉乃徳予嘉乃徳曰篤不忘言我嘉汝徳以其能篤前人所行而不忘其舊也與篤前人成烈篤敘乃正父相似所以為象賢也慎乃服命服命不過職守之命爾與康誥明乃服命同非服飾命服之謂也萬邦作式宋一諸侯耳臣于周者也如何為萬邦式蓋宋先代之後諸侯宋魯于是觀禮有欲學殷禮者必之宋也康誥明徳慎罰眀徳是崇教化使民有所視效而入于善慎罰是謹于用刑以輔之使民有所畏憚而不敢為惡聖人之治不過此兩事而已罰謂之慎非去之謂蓋必罰其所當罰而輕重出入不差毫釐然後民不敢犯若過故不分輕重失當則民惡者無所懲而善者反無所措手足矣罰如何去得雖堯舜不能廢但有謹慎不妄加耳庸庸是賞功威威是罰罪庸即車服以庸之庸不訓作用字祗祗亦不但是敬賢者凡所當敬者無不敬也區夏只是國都次及友邦已而怙冒西土則為西伯矣其始也徳顯于民而民歸之其終也徳聞于天而天命之誕受厥命越厥邦厥民當作一句言文王受厥命及厥邦厥民也不可以厥邦厥民屬下句肆汝小子封在兹東土厯述其父兄創業之難欲其知得國之由而不敢忽也恫瘝乃身恫瘝乃身敬哉言使汝有國者非富貴汝也以民社之重寄之汝適所以病汝也下文言天威可畏小人難保往盡乃心無康好逸豫乃其乂民此即所謂恫瘝汝身也謂視民不安如疾痛在己者非是天畏棐忱只是天可畏其去就無常惟誠則輔之猶皇天無親克敬惟親之義乃服惟𢎞王乃服惟𢎞王應保殷民亦惟助王宅天命作新民言汝職事不在乎他廣宣上徳以和保殷民者汝之職也助王以安定天命而作新斯民者亦汝之職也蓋康叔所治者殷民而殷民叛服闗天命去留係四方治亂當時武王雖已滅殷受命然天命猶未固四方猶未丕變也故武王猶以宅天命為憂觀後來三監倡亂而四國動摇周公破斧缺斨久而後定然後知武王之慮非過也康叔不從管蔡之亂蓋能心武王之心者武王之戒飭康叔如此其命三監得無告戒之言乎豈以三監既叛而史遂削之歟是不可考也已敬明乃罰敬眀乃罰所謂慎罰也式敬爾由獄惟敬五刑用刑不可不敬也惟眀克允用刑不可不明也有敘時乃大眀服有敘時乃大眀服惟民其勑懋和有敘者言立法制刑其重輕大小固有次敘如所謂五刑有服五服三就五流有宅五宅三居何嘗不截然各有次第然用刑者必眀其所服民方有所戒勑而勉于和服即五刑有服上服下服之服蓋當罪受刑之謂也所謂眀者何蓋刑有故焉有過焉二者不可不審也去惡如去疾斬然斷制而無姑息之意所謂刑故無小怙終賊刑則民知惡之不可為而畢棄咎矣保民如赤子蓋小民無知而犯法猶赤子無知而入井在所哀矜而非可加以罪者也則赦宥而全之使得自新如所謂宥過無大眚災肆赦則良民不至無所措手足而自康乂矣罰之貴于眀者如此汝陳時臬事汝陳時臬事罰蔽殷彞用其義刑義殺勿庸以次汝封言用法之際必取是法與是事比並而陳之案法如此而事如彼則合與不合昭然可見矣必法與事相當然後斷之所治者殷民則不得不用殷法然謂之常法必湯所制可以常行而非商紂之虐法也或輕而刑或重而殺必適于義義者宜也宜刑則刑宜殺則殺顧其所犯何如耳不可曲法以遷就汝喜怒之私若使就得汝心則刑殺必不合宜矣無所謂恐其泥古不通趨時而狥己之說也兄亦不念鞠子哀兄亦不念鞠子哀言兄亦不思其弟之可憐耳謂弟為鞠子者言其幼小尚未離鞠養猶言小子也觀康王自云無遺鞠子羞可見𫝊謂兄不念父母鞠養之勞者非也父不慈子不孝兄不友弟不恭如此而不于我政人得罪焉是為民上者坐視其傷風敗俗而不問則天之與我民彞幾何其不泯亂乎民彞即彞倫聖人之治以敘彞倫為急務所謂眀徳者眀此而已所謂慎罰者以弼此而已不能厥家人越厥小臣外正能如柔逺能邇之能謂化誨擾復之也汝亦罔不克敬典乃由裕民惟文王之敬忌乃裕民曰我惟有及則予一人以懌由訓用惟訓思言汝亦罔不克敬典用以裕民當思惟文王之敬忌以至裕民而心之所期者曰我思跂及于文王則予一人以懌矣蓋必有闗雎麟趾之意而後可以行周官六典之法度典固國之常典使無文王敬忌之心以行之則徒法而已矣民何自而得其安哉敬忌者慎罰條目之工夫也故呂刑云敬忌罔有擇言在身爽惟民廸吉康爽惟民廸吉康以下依舊是眀徳非欲其以徳用罰也我時其惟殷先哲王徳惟字當訓作思言我亦思惟殷先哲王徳用以康乂其民庶可與殷哲王為求匹耳不廸則罔有政在厥邦言人君政事止是導民于吉康所謂制其田里教之樹畜申以孝弟之義之類是也若不能導民何政事之有傳謂廸言徳而政言刑殊不可曉予惟不可不監告汝徳之說予惟不可不監告汝徳之說于罰之行依舊是以眀徳慎罰並言封敬哉無作怨封敬哉無作怨勿用非謀非彞蔽時忱欲其慎罰也蓋彞即罰蔽殷彞之彞蔽即丕蔽要囚之蔽正指用罰而言也丕則敏徳以下欲其眀徳也罰能謹而徳能眀我之所求于汝者此而已果能是雖欲瑕之而無可疵雖欲殄之而無可殄蓋諸侯而不稱職輕則貶爵削地重則六師移之武王之于康叔分則君臣親則兄弟而告戒之嚴凛然有不可以私恩貸公法之意者何也蓋殷民叛服繫天命去留關國家治亂不得不嚴為之戒勑也故下文又申以命不于常無我殄享而末復教以勿替敬典聽朕誥汝乃以殷民世享仁人之于兄弟親之欲其貴愛之欲其富而惟恐其不能保有禄位如此夫酒誥爾大克羞耇惟君爾大克羞耇惟君猶言能養老以盡為君之道相似蓋養老者國君之事也爾乃自介用逸介者副也言祭祀而灌獻者其正也祭畢而飲福以宴者其副也眀酒為祭祀設不止為宴飲設耳永不忘在王家所謂有成績以紀于太常之類邦君御事小子不腆于酒而武王以此之故受殷命何哉蓋沉湎者䘮亂之原則不耽于酒者固興邦之所由也殷先哲王廸畏天顯小民殷先哲王廸畏天顯小民經徳秉哲蓋旣畏天畏民則所行自無敢慢故經其徳而不變所謂日新又新不敢或作或輟蓋惟恐無徳而不足以享天心秉其哲而不移所謂是是而非非舉直而錯枉確乎其不亂蓋惟恐用舍顛倒而無以服乎人也自成湯至于帝乙成王畏相則為君者同一敬畏之心惟御事厥棐有恭則為臣者同一畏敬之心自暇自逸且不敢况敢尚飲乎商人尚敬之道蓋如此自成湯至于帝乙凡三見之蓋商之能有天下者始自成湯終于帝乙帝乙而下所謂在今後嗣王酣身者也紂為喪亂之主不足稱數故以帝乙終焉則自帝乙而上成湯而下凡為君者皆可稱道非指賢聖之君六七作者為言也汝劼毖殷獻臣汝劼毖殷獻臣以下欲康叔止酒先自貴族始蓋法之不行自上犯之大家世族冒行而不忌則何以責之小民故凡權勢貴要而難令者乃聖人所欲嚴為之禁制而不以姑息者也然而己身不正又何以律人故在己直須剛制于酒則令行而民莫敢犯矣衞為諸侯之國三卿則有之矣安得有所服休坐而論道之臣與夫太史内史者乎且康叔旣為一國之君矣又有所事所友并與已為疇匹者將何以為國乎此無他康叔所封者殷之故都凡此皆殷之故臣耳觀其起句所謂劼毖殷獻臣可見矣蓋殷之舊臣有嘗為諸侯者有為太史内史者有為公卿者康叔為王司冦則與三卿為疇匹而三公尊于己其所當事者太史内史與己為友者蓋以爵位之尊卑而論之也此等皆怙恃富貴輕犯國法者在康叔不可不先制之也傳以為此自逺而近自卑而尊則不然夫服休者三公也豈當在三卿之下乎要之本無次序羣飲拘殺羣飲勿佚拘執殺之所謂劼毖也蓋刑亂國用重典不得不爾典聽朕毖封汝典聽朕毖勿辨乃司民湎于酒者欲康叔剛制于酒也勿辨乃司司者職守之謂康叔而沈湎乎酒不治其職則何以禁民之湎酒哉猶羲和湎淫遐棄厥司之謂𫝊謂有司非也梓材以厥庶民以厥庶民暨厥臣達大家以厥臣達王𫝊謂通上下之情而使之無間其意不白無胥戕無胥虐無胥戕無胥虐當謂設監以治民使民無得相戕相虐爾非謂監者不得戕虐其民若如此言則于胥字說不通塗丹雘是三字塗之丹之雘之與塗曁茨義同先王既勤用眀徳先王旣勤用眀徳懷為夾庶邦享蓋古者封建諸侯各私其土各子其民其勢易至分裂而自守以天子而統馭萬邦千里之王畿其力豈足制諸侯哉所恃者有徳以柔服之而已故夙夜匪懈己之所以自治者益殷則殷聘世朝諸侯之所以事上者愈謹不然則諸侯不享而為天子者徒建空名于諸侯之上耳是故自古以來惟以四方朝貢為盛事如禹會諸侯執玉帛者萬國史書之以誇耀後世成王六服羣辟罔不承德至昭王而見侮于南國穆王而荒服不至夷王下堂以見而諸侯不來及宣王能復會諸侯于東都而遂為中興復古之盛績矣故周公敎成王亦以為敬識百辟享亦識其有不享為此故也召誥丁巳用牲于郊用牲于郊牛二傳云祭天地故用二牛非也蓋社即祭地安得又合祭天地乎其用二牛者祀天以稷配各一牛也禮云帝牛不吉以為稷牛是其証也郊社大事也周召以人臣行之可乎蓋因事祭告奉王册命以行事非常祭之比也王來紹上帝王來紹上帝自服于土中昔者幼冲政出大臣今洛邑既成而王新即政凡事皆須自已服行非可諉其責于他人也召誥雖不明言王來洛邑然召公拜手稽首旅王若公以下皆是如與成王面說則王來新邑分眀矣其說與洛誥相表裏洛誥是周公戒成王此是召公戒成王耳傳謂召公因周公歸而托轉達成王恐未必然蓋其間亦不見周公復歸宗周眀文况洛誥但見周公遣使告卜未嘗見周公先歸也洛誥初間亦不見成王來洛而中間却見成王歸周蓋古史必詳書此特因事記言耳故事之首尾不及具載王厥有成命王厥有成命猶云王其有成命皆是預期之之辭猶言王必有此效以從史之也成命者一成而不變有則保之而勿失之謂也王先服殷御事王先服殷御事蓋民不難化特恐有位者扺冒法禁而不忌則無以令小民耳故有位者服則沛然徳教洋溢乎四海矣亦豈必刑驅之亦夾習之于正人中日漸月染久將自化矣然君身不正如正人何故王當不怠于敬徳而後可自貽哲命自貽哲命與自作元命相似其制命之權不在天而在我其惟王位在徳元其惟者期之辭王位在徳元言居乎徳之首也蓋治民不在于嚴刑而在于修徳徳果超於衆人之上則人自觀感而化矣越王顯傳謂王徳顯非也蓋王者徳足以蓋天下而天下皆化之所謂黎民於變時雍之氣象也其聲名洋溢乎中國施及蠻貊凡有血氣莫不尊親則王豈不赫然章顯矣乎苟惟不然吾見其闇然無聞于世而已耳後面王亦顯可証保受王威命明徳威命眀徳威命者刑罰也眀徳者教化也人君之御天下徳與刑二者而已洛誥卜洛召誥言召公先至洛卜宅經營而後周公至洛誥却言周公卜而惟洛食何歟蓋周召奉王命以作洛二人同功一體不容分彼此于其間故以事實言之則召公得吉卜而經營自周公遣使復命言之則為周公卜宅而營洛也王肇稱殷禮王肇稱殷禮祀于新邑咸秩無文蓋成王宅洛之初其禮當如此王者為天下神人之主故即位即政必先享祀羣神朝會羣后成王昔者幼冲雖在位而未親政今洛邑成而王即政與新即位同故曰王肇稱殷禮是昔者王皆未嘗親祭也其舉盛禮自今始故當徧于羣神宜乎其咸秩無文也祭祀之後繼以敬識百辟享則教以朝會諸侯之事也此與帝舜攝政而類土帝禋六宗望祀山川徧于羣神之後即斂五瑞以覲于四岳羣牧同至其廵守方岳亦必先柴望而後覲東后先神後人禮當如此傳引呂氏之說謂定都之初大享羣祀有告有報有祈者既不切當且以周公首以祀新邑為言若迂濶于事情不知格君心萃天下之道莫要于此故周公以為首務者幾于迂濶可笑舜攝政而徧祭羣神武王勝商而柴望告成後世人主即位亦必祭告天地宗廟而凡祀典之神皆令有司蠲殷致祭豈亦藉此以格君心萃天下乎柰何其亦以此為首務也今王即命曰記功宗今王即命曰記功宗以功作元祀是繼接咸秩無文之後即是共祭于一時而下繼以惟命曰汝受命篤弼則是祭此人就命此人生祭功臣明矣是故成王明告周公曰四方廸亂未定宗禮未克敉公功厥後却用秬鬯二卣寧公其曰眀禋曰休享是生祭周公以功宗故也宗如宗子之宗功臣雖多必有一人為之冠是謂功宗而周室功臣未有過于周公者故以周公為之冠焉但不知古禮如何有生祭之典即命者疾速𤼵命使司勲者紀功猶云趣有司定功行封也丕視功載丕視功載乃汝其悉自教工蓋紀功載籍必昭示于大庭廣衆之間功之髙下有無自有公論不可以私意而為之輕重增損也凡可以使衆人見者其紀載必公不然則必不敢以示人矣乃汝其悉自教工非是教以公私乃教其勤于立功耳蓋有功則登于載籍無功不得幸而冒焉則有功者固加勉而無功者必慚憤思奮矣是不教之教也厥若彞厥若彞及撫事如予若彞猶云棐彞言順民常性是敷教化撫事是治政事二者如予是不可改舊政惟用在周工往新邑是不改舊臣如此則臣下知上意向無所變更各就其職展布四體以為治功自是成俗自是厚聲名自歸于汝矣蓋昔者政自公出而今王即新政周公恐其更張改作驚駭羣情則隳治功而壞風俗故不得不以此戒之後面又曰篤敘乃正父罔不若予可見此意伊尹復政太甲亦有君罔以辨言亂舊政皆此類也汝惟沖子惟終汝惟沖子惟終惟者思惟之惟言汝年甚幼後日方長未可輕有所為當思其終毋使有今罔後也傳云終文武之業者非是惟不役志于享惟不役志于享是釋上文言儀不及物是不用心于朝享故曰不享非全不來朝也公稱丕顯徳公稱丕顯徳以予小子揚文武烈能左右民以周公旣眀農以歸休成王欲周公留以輔我言我沖子耳非公眀保之而誰哉公當以徳佐我令我不墜前人之功烈上可以荅天眷下可以綏四方其責任之尊莫過于此惟有修徳庶㡬可以勝此任坐而論道以徳匡我舍公其誰惇宗將禮惇宗將禮稱秩元祀咸秩無文皆蒙上以予小子之文言我得以奉祭祀者皆公之力也揚文武烈荅公篤敘乃正父彼裕我民之辭惇宗将禮荅肇稱殷禮記功宗之辭惟公徳眀光于上下惟公徳眀光于上下予沖子夙夜毖祀終上文公稱丕顯徳稱秩元祀之意言有公如此故我得以如此也予小子其退即辟于周成王欲歸即君位于周不肯留洛𤼵政即辟與前面復子明辟相應或者舊說為然尚欠考訂四方廸亂四方廸亂未定于宗禮亦未克敉公功言今方欲導廸以治四方急于治民之事故未暇定宗禮亦未及敉公功耳廸如矧今民罔廸不適之廸傳謂四方開治公之功與下文不接我惟無斁其康事我惟無斁其康事公勿替刑四方其世享言我只不怠于安民之事公則當勿替為師師百工之儀刑君能厲精圖治又有老臣在朝以為諸侯之表儀四方自然世世朝享不絶矣此荅公敬識百辟享亦識其有不享之語傳謂四方得以世世享公之徳者非也其大惇典殷獻民其大惇典殷獻民此周公教成王以宅洛之務必恪守國之典章任用殷之賢者蓋出治不可以無法輔治不可以無人也且宅洛將以化殷民安可不就用殷士必使出治竦四方之觀聽而為新辟恭以接下足以為後王之率先若此者何亦曰自是居中出治使萬邦皆得以蒙其休而王有成功也成王即位久矣而此曰新辟者蓋即政自今始文武固恭以接下矣而曰恭先者蓋宅洛自成王績曰成績則萬邦之廣有一民不被其澤豈可以言成哉考朕昭子刑乃單文祖徳考朕昭子刑乃單文祖徳者言欲成就君之儀刑而殫盡文祖之徳蓋威儀徳之刑乎外動容周旋無不中禮是方成其儀刑必使其君雍雍在宮肅肅在廟如文王然然後得為殫文祖徳不然是未免有愧于前人也于成王則曰其自時中乂萬邦咸休周公自效則曰考朕昭子刑殫文祖徳蓋君以出治為功臣以輔君為職各欲自盡而已伻來毖殷此所謂以功作元祀者也故既奉灌地降神之酒而又重以眀禋休享之辭豈非生祀周公也歟周公能為人臣所不能為之功固當受人臣所不當受之禮公則自以為凡己之所能為者皆臣子之分所當為安得受此非常之祀哉故不敢歆其祀而以之禋祭文武而徼福于先王焉惠篤敘至殷乃引考此周公自禱之辭王伻殷至朕子懷徳乃為王禱祝之辭蓋無有遘自疾即自身康強而無有厭于乃徳者乃指成王言飽女福澤至于殷人亦引考則周公留洛主掌殷民故亦願其不為叛亂得保首領以没而蒙夀考之福也且殷乃讎民令之而有不從禁之而有不聽而王能使之承汝條教聽從號令不復懐思其舊主而乃觀法于汝懐思汝徳焉是雖成王化之有道然非文武在天之靈隂驅黙相安能至此故周公為成王願之新邑烝祭歳成王烝祭其日則戊辰其月則十二月其年則周公誕保文武受命之七年此史倒載之法也古無年號如此紀年猶云會于承筐之歳耳命公留後不當在此豈簡編錯亂邪抑史臣追書之也王命周公後作冊逸誥是又以冊書命公前面作冊以告文武此作冊以命公重其事故也多士惟帝不畀惟帝不畀惟我下民秉為即天視自我民視天聽自我民聽之意蓋上文言不畀殷而畀我恐殷民不信以為周公托天以自神耳天豈嘗諄諄然命之乎但民心之所向背即天意之所予奪也眀徳恤祀自成湯至于帝乙罔不眀徳恤祀眀徳是教化以治民恤祀是潔粢盛以事神君者神民之主也能盡此二者可以為君矣故天則丕建保乂而顧盼有殷眷命為之益隆殷王亦戰兢惕厲而惟恐有不合天意其所以眀徳恤祀者愈致其謹惟其罔不眀德恤祀所以罔不配天其澤配天其澤即所謂克配上帝而施澤于民言久有天下而已湯以七十里諸侯而升為天子非天丕建之而何傳祚至于六百非天保乂之而何惟我事不貳適惟爾王家我適不貳適者言無二心我周之為諸侯惟知忠于所事耳初未嘗有二心而欲弋取殷命也但爾王家自我適耳言不求而自至殷之亡非周之罪也以此推之殷人構亂必有興兵之辭意其必謂周本諸侯商之臣子耳乃懐二心干取大命故周之誥告首尾皆分析之辭傳謂周不二于帝殊失本㫖予亦念天即于殷大戾肆不正言我亦念天禍汝邦故汝不正而謀叛者皆天為之也無逸君子所其無逸無逸首以君子所其無逸與小人不知艱難作對說分為兩途下文却引三宗文王以實君子所其無逸之言引自時厥後立王生則逸以實小人不知稼穡艱難之語君子所以能所其無逸者以其先知稼穡艱難嘗涉厯辛苦然後處于安逸之地則知小人之依而自放心不下不能不以憂勤為心矣所謂三宗舊為小人作其即位而知小人之依者是也小人則不然其父母嘗勤勞稼穡其子未嘗渉厯艱苦而乃處安逸之地宜其縱誕無所不至自時厥後立王生則逸不知稼穡艱難不聞小人之勞而惟耽樂之從者是也傳以以勤居逸以逸為逸釋殊不可曉自時厥後人雖至愚亦知耽樂能損夀惟沈酗于酒則敗亂荒惑雖刀劍鼎鑊在前亦且不顧矣故周公特以此為言能不耽酒然後能所其無逸也徽柔懿恭徽柔懿恭與嚴恭寅畏寛裕溫柔聦明齊聖相類皆是以一字為義嚴恭寅畏是以四字形容其謹畏之心徽柔懿恭是以四字形容其和易之態而傳用呂氏之說專重柔恭而謂非柔懦之柔非足恭之恭乍觀似可喜子細體認若不柔懦不足恭則有儼然而畏之之状矣小民何由而近前鰥寡安得而相親文王和易之態又徽又柔又懿又恭藹然如慈母之于赤子所以懷保小民而惠鮮鰥寡也君奭在今予小子旦非克有正廸惟前人光施于我沖子此四句是一意皆周公自謙之辭上文言後嗣子孫遏佚前人光則墜夫天命然今小子旦非能有所正救其君啓廸思惟前人之光以及我沖子是不能保其不遏佚前人光也我聞在昔止多厯年所厯言前代皆是有君而有臣所以能治效通于天治功形于國而國家長久者此其故也其虞夏姑勿論且以近代言之湯受命時則有伊尹佐之以格天太甲太戊則有保衡伊陟臣扈佐之以格帝有巫咸以乂王家在祖乙武丁則有巫賢甘盤以保乂有殷此所以殷能配天而多厯年所也曰格于皇天曰格于上帝曰乂王家曰保乂有殷皆錯綜成文其實一也夫格天即所以格帝而乂王家乃所以格天帝安有優劣淺深之分傳用呂氏之說而強分聖賢優劣不知伊尹佐太甲以聖輔賢如何與以賢輔賢同一格帝而已且巫賢甘盤無所指言而謂六臣循惟此道不知循為何道也配天不過殷之未喪師克配上帝言有天下與天作配耳乃以為死而配天祭祀夫既死矣如何又多厯年所天惟純佑命天惟純佑命則商實此言有一代之天眷故有一代之人才自足以鼓舞天下而成一代之王業蓋聖賢者所在則人莫不靡然而信從之以其素行足以感人故也如伯夷太公歸周是天下之父歸之矣其子焉往宜其四方信之也湯一征而天下歸之信其志在誅暴救民而不為亂豈止是信湯只是有伊尹諸人在朝自足以彰信兆民耳且人之至信未有如信卜筮龜焉告吉未有復疑其為凶筮焉告凶未有復疑其為吉者人主所為而人嚮應如此其成功宜哉天夀平格保乂有殷有殷嗣天滅威此三句疑有闕文不可強觧廸知天威與後面誕將天威相首尾蓋天有亡殷之意而此秉徳之臣真知天威所在知殷必亡之理于是昭眀文王之徳奔走先後布宣徳教使其徳廸見冒聞于上帝而卒受有殷命也夫有徳之人善必先知之不善必先知之在文王時殷雖未亡而已逆知其將亡矣在武王時則殷可覆滅矣故此四人暨武王誕將天威以伐殷予往暨汝奭其濟其者期必之辭未敢以為決然也言若游大川獨力豈能濟與汝召公同往庶幾其有濟耳作汝民極天子以身建極于上而謂三公為民極者何蓋論道經邦使天下君君臣臣父父子子者三公之責是亦所以為民極也偶王者上而天子次即三公相與共治天下蓋三公所以副貳天子如耦耕相似在亶乗兹大命如亶聦眀之亶言的實如此夫天之大命無人焉以乗載之則墜地矣故偶王以乗此大命者公之責也夫謂之三公則位不可謂不尊欲其偶王以承大命纘文王之徳以承無窮之憂則責任不可謂不重武王命召公如此公乃欲去獨不思念前人之言乎傳云在于相信如車有馭非也亦罔不能厥初惟其終勉召公圖功攸終未可委之而去也蔡仲之命周公位冡宰傳引吳氏云周公居攝于諒闇之時非有七年而後還政之理康誥惟三月哉生魄周公初基作新大邑于東國洛傳云周公攝政之七年三月而洛誥一篇終始見成王新即政之事如云王來自服于土中肇稱殷禮厥若彞及撫事如予篤敘乃正父罔不若予皆是教成王自出政布治即前此政自公出可知傳所引前後自相牴牾皇天無親止終以困窮一段絶與太甲篇相出入言天輔民懷即是克敬惟親懷于有仁之說為善而歸于治為惡而歸于亂即是與治同道罔不興與亂同事罔不亡之說惟厥終終以不困不惟厥終終以困窮即是自周有終相亦惟終其後嗣王罔克有終相亦罔終之説吾意古文只是出于一手掇拾附會故自不覺犯重耳懋乃攸績懋乃攸績睦乃四鄰是本以蕃王室和兄弟康濟小民是由此出使般樂怠傲而當為者有所不為則無以治其國朝聘不時疆埸不戒而四鄰交侵則無以睦鄰如此則自救之不給上焉何以能屏蔽王家次焉何以尊位重禄同好惡以燕及兄弟下焉何以輕徭薄賦安恤小民故二者乃其本也率自中率自中無作聦眀亂舊章與詳乃視聽罔以側言改厥度相對言凡事皆有自然之中道汝但循其自然而行其所無事不須強作聦眀妄為穿鑿取新出竒而亂舊章更子細視聽不可以一偏之言而輕改法度蓋大凡有所作為若非自出己見則是聽人説誘己見不可穿鑿人言不可輕信舊章法度不可輕易變改諸侯能謹守國家成憲人君安得不嘉羙之傳以率自中一句為重而無作聦眀對詳乃視聽于罔以側言改厥度一句偏枯而無所著且云度者吾身之法度不知吾身有何法度之可改多方洪惟圖天之命弗永寅念于祀洪惟圖天之命弗永寅念于祀與上文不相蒙而與爾辟以爾多方大淫圖天之命屑有辭相類疑即指夏桀此處必有闕錯不可强通惟聖罔念作狂惟狂克念作聖聖者通眀之謂作事無不中禮者是也狂者顛倒妄行昬昧于理者也聖而罔念是不用心思索則顛倒是非而與狂者無異矣非聖而罔念作狂乎狂者固顛倒妄行苟能思念則不復妄為而與聖者亦無異矣非狂而克念可作聖乎傳云狂而克念則作聖之功知所向方聖而罔念未至于狂而狂之理在是是識聖狂形状不透隔皮想像之言耳惟我周王靈承于旅克堪用徳惟典神天君子先成民而後致力于神故民和而神降之福有眀德以薦馨香則神歆其祀故善承其民克堪用徳者可以為神之主民之所欲天必從之皇天無親惟徳是輔故善承其民克堪用徳者可以當天心天惟式教我用休蓋亦因其材而篤焉天知文武有可為之資故隂有佐佑而扶持之使其德日盛而業日新天休滋至寖明寖昌然後一旦簡畀殷命而尹爾多方也民承其君而曰君承其民是謂民惟邦本雖賤而不忽所謂王司敬民者是也我惟時其教告之止乃惟爾自速辜與舜之庶頑讒說侯以眀之否則威之相類皆是聖人不忍輕于棄人反覆教戒終于不改然後刑之蓋有不得已焉耳爾罔不克臬臬當訓法官爾惟胥惟伯多正自是長民執法者豈有不識法度爾乃自時洛邑尚永力畋爾田止有服在大僚言爾能勤力農畝則天必憐汝而賜汝豐年我周亦須補不足助不給以大介賚汝若廸簡汝在于王庭爾能勤于所事則有服在大僚當升陟汝矣蓋居而安于農業仕而勤其職業皆可以獲福也傳以大介賚爾連下文説不眀爾不克勸忱我命爾亦則惟不克享不奉上命即是無君之心故云不享立政常伯常任準人三宅即六卿之别號爾常伯即司徒六卿之中惟司徒為親民之官常任則冡宰司馬宗伯司空皆是任事之官國之大事在祀與戎祀與兵固事也司空亦名事官故此皆為任事之臣準人則司冦六卿位尊職重與人主共治天下故在王左右焉三宅繫天下安危治亂綴衣虎賁給事左右者繫王躬之薰陶涵養故曰休兹而不可不以得人為憂也文王惟克厥宅心乃克立兹常事司牧人以克俊有徳文王惟克厥宅心乃克立兹常事司牧人以克俊有徳此言文王眀于知人而所用無非賢文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違庶獄庶慎文王罔敢知于兹此言文王逸于得人故不須以身兼理庶事但是有司牧夫用命者賞不用命者罰而已至于庶獄庶慎則文王何敢與知焉夫君道逸臣道勞文王眀于知人得賢者而委任之則可以優游無為而庶事自治矣何必以身兼之哉蓋其所操者不過黜陟之權而已舜命二十二人以任庶政自己惟三載一考績三考而加以黜陟耳此所以得君道也然使知人無術而所用非人乃欲委任之專而不以身兼其事不可得已傳者以為任人之専尚不足以盡其㫖義徳容徳義徳能撥亂反正所以能成大功容徳能兼緫衆善所以能定大謀克灼知厥若灼知厥若是眀察于未任之先丕乃俾亂勿有間之是專篤于既任之後夫疑人勿任任人勿疑已無知人之明乃恃小人以伺察之果何由展布哉自一話一言我則末惟成徳之彦以乂我受民與上文相我受民勿有間之相終始言委任之専篤但一開口必在于成徳之彦如此方専使議論之間微有向背鏬隙則讒邪得以乗間入之矣其克詰爾戎兵止揚武王之大烈陟禹迹者何廵守也天子之出必有兵衞六軍以隨之方行天下徧厯四岳也整點軍衞廵行天下足以振壓姦宄坐消禍變所至之處足以見文王之耿光足以不墜武王之大烈蓋文王徳光本自照臨四海而武王一戎衣有天下其烈莫盛焉使子孫不能保有其基業而為他人分裂之則藩垣之外皆他人地文王徳光雖在彼而子孫無由覲見之武王辛苦成功者竟墜地而不振矣傳者不察其為廵守而云周公無故教成王點兵不知周官所謂周王撫萬邦廵侯甸四征弗庭綏厥兆民六服羣辟罔不承徳者即所以實此語也以此證之則舜陟方乃死為廵守而死無疑而傳以陟為升遐乃死者非矣周官撫萬邦成王始親政故廵守而歸整肅在朝之官此繼立政之後其廵守奉行周公詰戎兵方行天下之訓其董正治官也奉行周公立政三宅之語隱然相應唐虞稽古蓋自黄帝得六相設左右大監監萬國雲龍鳥火之號其來尚矣到堯舜時監前代㳂革而緫集大成故其法度體統森嚴周密内有百揆四岳百揆即九官也眀王立政是緫唐虞夏商之君言之言唐虞能使庶政和而萬國安夏商亦克用乂者蓋不恃其建官恃得人耳賢者能立政官不足恃也傳云不惟其官之多經無此意今予小子祗勤于徳夙夜不逮仰惟前代時若訓廸厥官蓋前代制治保邦者無他建官擇人以立政而已故予小子亦仰惟前代時若而訓廸厥官蓋天下之事非一人所能為也立太師太𫝊太保止官不必備惟其人三公為天子之師不親政事所職者坐而論道耳所論者何道即經綸邦國和調隂陽之道也夫邦國若此其大也要使之君君臣臣父父子子井然有條而不亂此必有其道隂陽運行于天地之間而能使三光全寒暑平無愆陽伏隂以多變此亦必有其道是道也惟三公為能明達其所以然則使之論説于天子之前至于以其道見之施為則天子宰相之責也官不必備惟其人非其人之難得也以知道者之不可多得也六卿分任庶政一官不備則一政闕三公同論此道則得一知道者足矣否則雖多亦奚以為三公夑理隂陽燮理隂陽别無他道惟區處人事各得其宜則天地之氣自順故堯舜在上而天災滅熄庶徵太和有夏懋徳而罔有天災考其所為不過咨四岳九官十二牧分任庶政使人人各遂其性而已初未嘗特設燮理隂陽之官亦未聞别有燮理隂陽之政太戊修徳以弭桑穀之妖亦不過早朝晏罷弔死問生勤于政治而已然以道經邦乃所以燮理隂陽也故天災少見于治平之世而迭見于衰亂之時者以其所為有以召之也彼匹夫銜寃猶足致三年之旱况政乗民困而千萬人詋詛歎恨豈不足以傷兩間之和今論者不察此徒曰吾能治一身之中和則心正氣順而天地自位萬物自育世寧有是理哉甚者災變之來則歸過于三公而策免之謂其燮理無状夫論夑理之道者三公也而行夑理之政殆君相之責非盡三公所得為也使三公而無所建明則䇿免之誠不為過若其言之而不聽聽之而不行君相所為自有以召天變不知自反徒歸咎于三公豈不過哉且後世三公居散地經邦之事全不干與而徒責其燮理隂陽其訛謬益甚矣丙吉逢羣鬬死傷不問而問牛喘以為三公調隂陽職當憂不知當春而熱隂陽失序吉憂之當如何而調之邪夫治爭鬬固非宰相之職然使有司失職而死傷寃抑無所告訴其干隂陽之和不亦大可慮邪故為吉者問爭鬬則不可至于戒飭有司審理寃濫不可不加之意也三孤貳公𢎞化三孤為三公之佐故曰貳公言其為三公副貳也𢎞化與經邦為對化者教化即所用以經邦者也寅亮天地與燮理隂陽為對亮者相也與惟亮天工之亮同謂補助其所不及也弼予一人弼者匡輔其不逮也此皆就行事上說與三公之職微冇不同蓋三公長官三孤佐貳均此職也長官尊主張其事于上佐官卑身任其事于下是故三公經邦是運天下于掌上者三孤𢎞化則是因其已成之化而推廣之耳三公燮理隂陽是範圍天地之化者三孤寅亮天地只是輔相其不及而已三公論道是教訓天子者三孤弼一人只是彌縫其闕失而已此所以為公孤之別𫝊謂呂氏説謂隂陽之理恒而不變者為道天地之用運而無迹者為化牽强附會但圖對偶親切耳而不察實事不知天地之化運于無迹將使三公何如張而大之三公上言立而下言官不必備惟其人而三孤六卿不言者蓋立凡例于前而後皆蒙其語耳𫝊者不察謂三公非始于此立為周家定制則始于此三孤六卿獨非立為周家之制者乎何以不言立也夫立與建同建官惟賢豈亦必自武王設官而謂之建邪蓋立官建官設官皆恒言耳且三公必其人而不必備員三孤六卿獨可備員而非其人乎以此知特𤼵例于此耳非專為三公言也六卿倡九牧六卿緫治于内九牧親民于外六卿之職雖不同而其為民則一也冡宰均四海固所以治民司徒掌教以復民性宗伯掌禮以定民志司馬掌兵以衛民患司冦掌刑以詰民姦司空掌土以定民居以此倡九牧而九牧皆一一奉行于外則民自殷阜而化成矣君子先成民而後致力于神成之者治之養之教之無欠闕之謂也學古入官學古入官眀于古道議事以制則叅以時宜如此則博古通今而政無錯繆者矣其爾典常作之師欲其守常也無以利口亂厥官戒其好異也猶云罔以側言改厥度罔以辯言亂舊政皆為輕信他人之言耳𫝊云不可喋喋利口而紛亂之似以為自己利口非也功崇惟志建功業者在于志與勤而志勤必貴于果斷保禄位在于恭與儉而恭儉必貴于實徳前是告之以建功業之道後是語之以保禄位之方所謂後艱者非後患乃艱難而不易耳蓋天下之事乗其幾而為之則易為力後其時而為之則難為功推賢讓能一人推讓則衆人咸起而推遜所謂濟濟相讓而庶官和矣不然則人各有心其為乖戾甚矣政事安得歸于一而不雜哉萬邦惟無斁此一語不可觧古文書屢言無斁如云朕承王之休無斁俾我有周無斁皆訓厭斁朕無斁于王周無斁于微子皆可通訓至于戒飭百官而云以佑乃辟永康兆民萬邦惟無斁不成萬邦厭斁百官且惟之一字更不可通此古文闕漏處君陳爾其戒哉爾惟風下民惟草𫝊引草上之風必偃非也蓋凡人未見聖則起慕慨想惟恐不得見及其既見則怠惰因循亦不克由聖此凡人常情然在凡人則可在爾有所不可何也爾居民上而為風民居爾下而為草爾且如此民何則焉欲其所為以凡人為戒而自強于治必以周公為法可也出入自爾師虞或廢或興莫不謀諸衆人而後蔽之于己所謂繹者再三反復思之不可造次剖決恐其有不周備此即所謂莫或不艱者也從容以和從容以和只是凡事無急廹當從容寛緩以和之蓋近民之法當如此耳否則急促躁暴强速化而民且無所措手足矣𫝊謂和不可一于和當從容以和之語不可通殷民在辟予曰辟爾惟勿辟殷民在辟在宥而惟厥中者言必審其當爾使其中辟則辟之中宥則宥之不中則否雖君言有所不可從也下文辟以止辟乃辟此是中辟者辟之也三細不宥此是不中宥者宜勿宥也無忿疾于頑無求備于一夫無忿疾于頑是有忍也無求備于一夫是有容也言各有主蓋事有當忍者有當容者𫝊謂忍猶堅制力蓄恢乎其有容斯乃徳之大意謂容勝于忍又分淺深似不必如此未化者不可忿疾已化者不可求備且一味容忍將去就其中有能修其職業修其行義者簡㧞而登之使彼有所慕焉則頑者有時而自化不修者有時而修矣惟民生厚因物有遷違上所命從厥攸好孩提之童皆知愛親及長皆知敬兄民生本厚也知誘物化然後百姓不親五品不遜者有之蓋因物有遷耳是以違上所命教令有所不行從厥攸好而放僻邪侈無所不為厥者其也指民而言自徇己所好耳以為從上所好者非也爾克敬典在徳止終有辭于永世言臣能得所以化之之道而使人人向化易澆漓之俗而升為大道之世則我可膺受多福矣蓋天下治平者君之福也其爾之休終有辭于永世者擬議于將然之辭言民皆從化則爾臣亦何所不得乎殆亦有無窮之聞故曰有辭于永世是臣之休也𫝊以為臣承其美者語意弗眀顧命恐不獲誓言嗣言恐一旦而死不得出誓言以屬托嗣子承繼之事敬迓天威嗣守文武大訓敬迓天威是敬天嗣守文武大訓是不敢背棄祖宗成憲各有所指𫝊謂于天言威于文武言大訓非有二也殊不可曉不成文武法度即天威乎𢎞濟于艱難王業以艱難成之亦必以艱難守之𢎞濟于艱難言守成難必待諸臣與君共濟之也柔逺能邇安勸小大庶邦此教以治人之道思夫人自亂于威儀則是教以修己之道敷重篾席敷重筍席篾席筍席皆指其物名㡳席豐席獨不言其物蓋㡳席以其底而在下猶今以末職為㡳僚相似言其最下而著底也豐者言其髙而在上未知何物為之𫝊謂㡳席為蒲席蒲草賤或者因此謂之㡳席至謂豐席為筍席則不應又自有筍席此為可疑要之今人言書多錯互見亦未可知臨君周邦臨君周邦不過為天子以莅其民率循祖宗之大法燮和天下以此對揚文武之光訓𫝊謂居大位由大法致大和牽連三大字殊覺牽強無味顧命一篇鋪敘始末宛如圖畫甞謂今文書如禹貢洪範顧命費誓條理曲折法度森嚴若有錯簡闕文則全無可理㑹矣而此皆出于伏生口授先儒謂伏生書不可曉晁錯以意屬讀之此等豈晁錯自能以意想像而言之者乎故知衞宏之說蓋左袒古文而欲抑今文其言決未可信洪範中間似有錯簡康王之誥惟新陟王畢協賞罰止用敷遺後人休蓋文武能受天命以有天下耳定大下致太平以遺後人者成王也其所以戡定者無他惟畢協賞罰而已蓋刑賞乃人君之大權使賞必當功而不􅆫刑必當罪而不濫則天下不勞而定矣昔君文武丕平富止保乂王家君之徳用昭眀于天下所謂彰信兆民即康誥所謂顯民者是也人臣保乂王家而用端命于上帝即是輔相其君扶持其國使治效上通于天即君奭所謂乃惟時昭文王廸見冒聞于上帝之謂由此然後皇天用順文武之道而畀付以四方其與帝休天乃大命文王殪戎殷皆相出入故知用端命于上帝與用昭眀于天下作對說而端命二字亦若活字猶云感格上帝相似𫝊云文武用受正命于天下而經文無受字其説未安康王冕服成王初立經三監之變王室幾危召公畢公故權一時之宜即正君臣之分使天下知所定而無疑繼世以正大統天下之大義不可以更張廢吉凶不可亂孔子曰羔裘𤣥冠不以弔則凶服亦不可為吉事也變服變禮𫝊引蘇氏之説而葉呂陳氏之說皆有可取要之召公酌禮之變而用之所以懲前之禍也畢命惟文武敷大徳于天下惟文王式王敷大徳于天下用克受殷命此言得天下之由惟周公左右先王止式化厥訓此言化殷之由既厯三紀止予一人以寧此言殷民已化而天下治安矣道有升降止民罔攸勸此言政事當随時變遷今之世又非復周公初定殷民之時宜有旌别淑慝之政蓋殷民初定周公一味包涵鎮之以静使久而自定到今則世變風移善者當賞惡者當懲宜有以少變其習俗矣申畫郊圻慎固封守以康四海蓋洛都乃京畿所在而與下都讎民相鄰故畢公一面旌别淑慝以化之一面固封守以防之聖人固恃徳以服人然亦未甞不豫備不虞故易有重門擊柝以待暴客又言王公設險以守其國否則疆埸不戒以啟戎心此誰之咎歟洛帝都也帝都一摇則四海相煽而受禍矣故云以康四海邦之安危惟兹殷士此與式王告康叔以乃服惟𢎞王應保殷民亦惟助王宅天命作新民之意同𫝊謂其不茍于小成非也昔者商奄構難四國動摇其後式化厥訓四方無虞邦之安危固不在于殷士乎遇之以剛則急之而生變撫之以柔則又狎玩而肆侮惟不剛不柔而後可也周公慎始君陳和中周公克慎厥始君陳克和厥中皆見于已然惟公克成厥終是期望之于將然言此事非畢公不能終也蓋殷民難服繫天下安危天下安危繫人主憂樂使殷民從化則天下治安天下治安則災害不生禍亂不作外而四夷亦得以被其賜而一人固可以享其休故曰四夷咸賴予小子永膺多福欽若先王成烈以休于前政言畢公當敬若文武之功毋墮周公君陳之政也君牙𢎞敷五典式和民則此語以施教之方典即五常父子君臣是也則者父之慈子之孝之類是也以其常行而不可易則謂之典以其不可過不可不及則謂之則爾身克正罔敢弗正民心罔中惟爾之中此語以立教之本夏暑雨暑雨祁寒民胥怨咨其生之艱難如此為司徒者皆當圖之蓋司徒為親民之官凡制其田里教之樹畜皆司徒之職蓋民必飽煖然後能服從教化敷教特舉其重者言之耳觀周禮地官所職掌可見不然則公劉作室召司空宜也如何并召司徒欒盈過周為人所掠王使司徒衞而出之境武王伐商有司徒與司馬司空自随蓋謂之司徒政是重掌民徒起徒役皆屬之司徒用奉若于先王對揚文武之光命當作一句讀蓋文謨武烈所以遺後者無不完爾但敬以明司徒之訓以教人能如先王所以對揚文武光命焉則可以追配前人矣蓋光命即謨烈也前王成康用爾祖父為司徒故能對揚文武光命而不墜其治民之法今汝能不失成康之意則與祖父無異矣乃惟由先正舊典時式民之治亂在兹夫教化行而君君臣臣父父子子則天下治教化不眀而君不君臣不臣父不父子不子則天下亂則民之治亂不在此而何在乎呂刑遏絶苗民無世在下若止于竄其君不當稱民既云無世在下不當後來又有征苗之事以此見竄三苗者不但竄其君必并其民而徙之故云分北三苗後來苗民被竄者皆改所事故禹貢云三苗丕敘而禹謨征苗一段此後人杜撰之辭非實事也絶地天通在天而神在地而民無相瀆亂則妖誕自息此固正人心急務然使常道不眀為善者或不得免禍為惡者或茍免于刑而鰥寡屈抑無所告訴則民不能不詋詛于神故羣后之逮在下凡長民者眀眀棐常雖勢力單弱之甚如鰥寡者其情亦得以上達而無復屈抑不伸之患則民又何苦而聽于神哉徳威惟畏徳眀惟眀眀者彰其善威者懲其惡刑當其罪者謂之徳威故人無不畏賞當其善者謂之徳眀故人無不眀伯夷降典折民惟刑凡禮教與刑相表裏故司徒敷教亦必有刑以弼之伯夷降典以辨上下之分有不從者則以刑折之使其陵僭者不得以自遂則其勢不得不折而入于禮也士制百姓于刑之中以教祇徳三后成功民既殷阜然後使士師以不輕不重之刑以制之以教其敬徳也蓋民未殷富時所謂救死不贍何暇治禮義其陷于刑戮者非民之罪也今導之而生養遂矣有不率教則不可無刑以糾之矣此是先教養而後刑罰穆穆在上眀眀在下止率乂于民棐彞君臣以身率之于上朝廷清眀四方丕變矣然後眀于刑之中者以治民而輔其常性彞即彞倫如糾之以不孝不弟之刑以驅而入于孝弟是即所以棐彞也此是先徳教而後刑戮之意又以見徳化雖已興行而刑亦不可廢蓋非此無以弼教也兩言刑之中者何蓋刑而失之重則傷于苛暴而民無所措手足失之輕則流于姑息而惡者無所懲惟酌其中則能使人畏服而不敢犯惟克天徳自作元命配享在下諸家皆自典獄之人言之然謂之元命是國命與厥惟廢元命同謂之配享在下是又言人君享國與天相配與克配上帝配天其澤之意同蓋謂所用典獄之人能敬忌之至用刑悉無寃濫則是人君徳與天合而自作元命猶云自貽哲命可以長治久安而配享在下矣此即司冦蘇公式敬爾由獄以長我王國之意耳有邦有土告爾祥刑在今爾安百姓有邦有土固常以安百姓為職果能擇人敬刑而審度其所逮及者是即所以為祥刑矣兩造具備兩造具備猶云原告被論干証悉完也師聽五辭猶今團坐公同推問也惟齊非齊有倫有要言刑罰或輕或重以不齊齊之然其間自有倫理自有機要未甞雜然而無統任意而為之進退也所謂權也而實不離乎經焉今天相民今天相民猶云天佑下民相似作配在下言汝官伯族姓有邦有土皆配天在下以相民者也𫝊云天以刑相治斯民者非民之亂罔不中聽獄之兩辭亂者治也言治民之道無不中聽獄之兩辭無或私家于獄之兩辭蓋單辭者只是一面辭惟當眀清以聽之兩辭則各執一說非單辭之比主于中以聽之未可有所偏主私家者偏有所主之謂也蓋以私意而主于原告則被告雖有理亦不肯聽矣主于被告則原告雖得實亦不肯信矣如此則安得為中獄貨非寳惟府辜功言鬻獄而得貨豈足以為寳不過聚蓄辜罪之顯迹耳他日受報將報以庶尤殆降之百殃也前言朕敬于刑後言永畏惟罰以刑罰對言而以敬畏互言也罰懲非死人極于病刑固當敬也罰獨不可畏乎非天不中以下又申言報以庶尤之意言用刑失當者受報如此此豈天有不中而妄加人禍哉惟人在命只人自造命而有以致之耳猶云自貽哲命自作元命之意天之所罰者為其不極庶民惟其罔有令政在于天下極即原于皇極之極不極庶民只是刑罰失中不協于極耳𫝊謂此章文多未詳以意逆志當如此釋之似得其㫖今往何監非徳于民之中此與今爾何監非時伯夷播刑之廸相似徳即有徳惟刑之徳中只是刑之中篇中中字不一皆是主刑言謂為民所受之中恐未然屬于五極謂五刑各臻其極于事理無有少不當之謂文侯之命即我御事罔或耆夀俊在厥服即就也言就我御事之中觀之無老成賢俊者在事予又無能不過曰惟祖惟父其爾恤朕躬耳伊當訓爾蓋朝無臣已無能自克惟外服諸侯庶幾能矜我爾其論卑氣弱有乞憐之狀其視康王初即位而求助諸侯羣臣其言豈不壯哉用㑹紹乃辟𫝊謂合之使不離繼之使不絶者何蓋平王失愛于父流離顛頓依托母家父死于冦國命中絶而文侯能合之繼之也費誓徂兹淮夷徐戎並興徂往當從孔氏言今往伐此戎夷為是孔氏謂戎夷帝王羈縻故錯居九州之内竊意古者天下初闢禮義之風未能悉徧凡無禮無義者輙以戎夷目之而有禮義者輙謂為華夏非必四海九州之外而後為戎夷也故五服之制則蠻夷在要荒之地然以周時考之太原有白狄徐州有淮夷徐戎齊有萊夷伊川有陸渾之戎而吳楚大國皆擯以夷狄是又非必皆在要荒之地也臯陶以刑制蠻夷猾夏只是無禮義而侵亂禮教者輙刑之而𫝊者不察遂妄謂臯陶掌兵不知彼時蠻夷與中國之俗雜處何待于兵革豈如後世遣大將征伐四夷之謂乎此書得之西臯王氏寫者甚草草而其末尤甚當時恐失其真輙以紙臨寫一本而以意正若干字略可讀吁惜吾生之晚不得摳衣于耕野之堂也梅幼和鶚云讀書管見卷下
